<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Champion Simulator — Urgot Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4ADE80;--green-mid:#22C55E;--green-dark:#15803D;
  --bg:#060D07;--bg-s:#0B1A0D;--bg-c:#0F2211;--bg-c2:#132417;
  --border:#1A3D1E;--border-b:#2D6A33;
  --txt:#A8D4A0;--txt2:#4A7550;--bright:#E8F5E2;
  --gold:#C89B3C;--red:#C84B4B;--acid:rgba(74,222,128,.2);
  --blue:#4A9EDE;--orange:#E06B4A;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;overflow-x:hidden;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(26,61,30,.05) 50px),
  repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(26,61,30,.05) 50px);}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:2px}

/* ── NAV ───────────────────────────────────────────────── */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 2rem;background:rgba(6,13,7,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.nav-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.2em;color:var(--green);text-decoration:none}
.nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center}
.nav-links a{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--green)}
.btn-nav{background:none;border:1px solid var(--border);border-radius:3px;color:var(--txt2);
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;cursor:pointer;transition:all .2s}
.btn-nav:hover{border-color:var(--green-dark);color:var(--green)}

/* ── ROW DIVIDER ────────────────────────────────────────── */
.row-divider{display:flex;align-items:center;gap:10px;padding:0 1.5rem;height:26px;
  background:var(--bg-c2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.row-divider span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--txt2)}
.row-divider::before{content:'';flex:1;height:1px;background:var(--border)}
.row-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.row-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--txt2);
  padding:.3rem .8rem;background:var(--bg-s);border:1px solid var(--border);border-radius:2px}

/* ── ROW 1: SHOP ────────────────────────────────────────── */
#shop-wrap{background:var(--bg-c);border-bottom:1px solid var(--border);padding:.7rem 1.5rem}
.shop-top{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;flex-wrap:wrap}
.side-tabs{display:flex;gap:5px}
.side-tab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 14px;border-radius:3px;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.side-tab.left-tab{color:var(--blue);border-color:#4A9EDE33}
.side-tab.right-tab{color:var(--orange);border-color:#E06B4A33}
.side-tab.active.left-tab{background:#4A9EDE18;border-color:var(--blue)}
.side-tab.active.right-tab{background:#E06B4A18;border-color:var(--orange)}
.item-slots{display:flex;gap:5px;align-items:center}
.item-slot{width:42px;height:42px;border:1px solid var(--border-b);border-radius:4px;background:var(--bg-s);
  cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-slot:hover{border-color:var(--green-mid)}
.item-slot.active-slot{border-color:var(--green);box-shadow:0 0 10px var(--acid)}
.item-slot img{width:100%;height:100%;object-fit:cover}
.slot-x{position:absolute;top:0;right:0;background:var(--red);color:#fff;font-size:8px;width:12px;height:12px;
  display:none;align-items:center;justify-content:center;cursor:pointer;border-radius:0 0 0 3px}
.item-slot:hover .slot-x{display:flex}
.slot-empty-dot{width:18px;height:18px;border:1px dashed var(--border-b);border-radius:2px;opacity:.4}
.shop-filters{display:flex;gap:4px;flex-wrap:wrap}
.cat-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 9px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--txt2);cursor:pointer;transition:all .2s}
.cat-btn.active,.cat-btn:hover{border-color:var(--green-dark);color:var(--green);background:rgba(26,61,30,.3)}
.shop-search{background:var(--bg);border:1px solid var(--border-b);border-radius:3px;color:var(--bright);
  font-family:'Rajdhani',sans-serif;font-size:13px;padding:4px 10px;outline:none;width:160px;transition:border-color .2s}
.shop-search:focus{border-color:var(--green-mid)}
.shop-search::placeholder{color:var(--txt2)}
.shop-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;margin-top:.5rem}
.shop-item{width:38px;height:38px;border:1px solid var(--border);border-radius:3px;cursor:pointer;overflow:hidden;
  transition:border-color .15s,transform .12s;background:var(--bg-s);flex-shrink:0;position:relative}
.shop-item:hover{border-color:var(--green-mid);transform:scale(1.1);z-index:10}
.shop-item img{width:100%;height:100%;object-fit:cover}

/* ── ROW 2: RUNES ───────────────────────────────────────── */
#runes-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.rune-panel{padding:.7rem 1rem;border-right:1px solid var(--border);overflow:hidden}
.rune-panel.rp-right{border-right:none}
.rp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.rp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--txt2)}
.tree-dots{display:flex;gap:4px}
.tree-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.tree-dot.td-precision{background:#C8AA6E}.tree-dot.td-domination{background:#C84B4B}
.tree-dot.td-sorcery{background:#4A6EDE}.tree-dot.td-resolve{background:#4ADE80}.tree-dot.td-inspiration{background:#4ADEDE}
.tree-dot.active.td-precision{border-color:#C8AA6E;box-shadow:0 0 6px #C8AA6E66}
.tree-dot.active.td-domination{border-color:#C84B4B;box-shadow:0 0 6px #C84B4B66}
.tree-dot.active.td-sorcery{border-color:#4A6EDE;box-shadow:0 0 6px #4A6EDE66}
.tree-dot.active.td-resolve{border-color:#4ADE80;box-shadow:0 0 6px #4ADE8066}
.tree-dot.active.td-inspiration{border-color:#4ADEDE;box-shadow:0 0 6px #4ADEDE66}
.rp-section{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt2);margin:.3rem 0 .2rem}
.rune-row-h{display:flex;gap:4px;margin-bottom:.2rem;flex-wrap:wrap}
.rune-ic{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;overflow:hidden;
  transition:all .15s;background:var(--bg);flex-shrink:0}
.rune-ic img{width:100%;height:100%;object-fit:cover}
.rune-ic:hover{border-color:var(--txt2);transform:scale(1.08)}
.rune-ic.rk{width:34px;height:34px}
.rune-ic.sel{border-color:var(--gold);box-shadow:0 0 8px rgba(200,170,110,.45)}
.sec-sep{border-top:1px solid var(--border);margin:.3rem 0;padding-top:.3rem}
.shard-row{display:flex;gap:3px;margin-bottom:.2rem;flex-wrap:wrap}
.shard-b{font-size:9px;padding:2px 5px;border:1px solid var(--border);border-radius:2px;background:var(--bg);
  color:var(--txt2);cursor:pointer;transition:all .15s;white-space:nowrap}
.shard-b.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,170,110,.1)}

/* ── ROW 3: CHAMPIONS ───────────────────────────────────── */
#champs-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.champ-panel{padding:1rem;display:flex;gap:1rem;align-items:flex-start;border-right:1px solid var(--border)}
.champ-panel.cp-right{border-right:none;flex-direction:row-reverse}
.champ-portrait-wrap{flex-shrink:0;cursor:pointer}
.champ-portrait{width:120px;height:150px;border-radius:5px;border:2px solid var(--border-b);overflow:hidden;
  background:var(--bg-s);display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.champ-portrait:hover{border-color:var(--green-mid)}
.champ-portrait img{width:100%;height:100%;object-fit:cover}
.champ-info{flex:1}
.champ-name-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.champ-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;color:var(--bright)}
.champ-encoded-badge{font-size:8px;padding:2px 6px;border-radius:10px;border:1px solid var(--green-dark);
  color:var(--green);background:rgba(74,222,128,.08);font-family:'Cinzel',serif;letter-spacing:.1em}
.champ-change{font-size:10px;color:var(--txt2);cursor:pointer;transition:color .2s;margin-bottom:.4rem}
.champ-change:hover{color:var(--green)}
.level-row{display:flex;align-items:center;gap:6px;margin-bottom:.4rem}
.level-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--txt2)}
.level-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
.level-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg)}
.level-val{font-family:'Cinzel',serif;font-size:11px;color:var(--green);min-width:18px;text-align:center}
.stats-mini{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.sm-row{display:flex;justify-content:space-between;padding:2px 5px;border-radius:2px;font-size:11px}
.sm-row:nth-child(odd){background:rgba(26,61,30,.2)}
.sm-key{color:var(--txt2)}
.sm-val{color:var(--bright);font-weight:600}
.sm-val.green{color:var(--green)}
.left-side-color{color:var(--blue)}
.right-side-color{color:var(--orange)}

/* ── ROW 4: SPELLS ──────────────────────────────────────── */
#spells-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.spells-panel{padding:.7rem 1rem;border-right:1px solid var(--border)}
.spells-panel.sp-right{border-right:none}
.spells-header{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--txt2);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.spells-cards{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.spells-cards::-webkit-scrollbar{height:3px}
.spells-cards::-webkit-scrollbar-thumb{background:var(--border-b)}
.spell-card{min-width:110px;max-width:140px;flex:1;background:var(--bg-s);border:1px solid var(--border);
  border-radius:4px;padding:.5rem;display:flex;flex-direction:column;gap:3px;transition:border-color .2s}
.spell-card:hover{border-color:var(--border-b)}
.sc-top{display:flex;align-items:center;gap:5px}
.sc-icon{width:36px;height:36px;border-radius:4px;border:1px solid var(--border-b);overflow:hidden;
  background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sc-icon img{width:100%;height:100%;object-fit:cover}
.sc-key{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:.1em}
.sc-key.k-P{color:var(--txt2)}
.sc-key.k-Q{color:#4ADE80}.sc-key.k-W{color:#4ADE80}.sc-key.k-E{color:#4ADE80}.sc-key.k-R{color:var(--gold)}
.sc-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.06em;color:var(--bright);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.sc-cd{font-size:10px;color:var(--txt2)}
.sc-cd b{color:var(--blue)}
.sc-cost{font-size:10px;color:var(--txt2)}
.sc-cost b{color:#7EB8FF}
.sc-desc{font-size:10px;color:var(--txt);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-dmg{font-size:12px;font-weight:700;margin-top:2px}
.sc-dmg.phys{color:var(--gold)}.sc-dmg.magic{color:#8B9EFF}.sc-dmg.true{color:var(--bright)}.sc-dmg.na{color:var(--txt2)}
.sc-note{font-size:9px;color:var(--txt2);font-style:italic}
.rank-pips{display:flex;gap:2px;margin-top:2px}
.rp-pip{width:12px;height:3px;border-radius:2px;background:var(--border);cursor:pointer;transition:background .12s}
.rp-pip.active{background:var(--green)}
.sc-no-encode{font-size:9px;color:var(--txt2);font-style:italic;margin-top:4px}

/* ── TOOLTIP ────────────────────────────────────────────── */
#tt{position:fixed;background:var(--bg-c2);border:1px solid var(--border-b);border-radius:4px;padding:8px 10px;
  font-size:11px;color:var(--bright);z-index:1000;pointer-events:none;max-width:210px;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.8);line-height:1.5}
#tt .tt-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);margin-bottom:3px}
#tt .tt-stat{color:var(--txt);font-size:11px}
#tt .tt-pass{color:var(--green);font-size:10px;margin-top:3px}
#tt .tt-cost{color:var(--gold);font-size:10px;margin-top:2px}

/* ── MODAL ──────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg-c);border:1px solid var(--border-b);border-radius:6px;width:min(720px,95vw);
  max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.9)}
.modal-head{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.2em;color:var(--bright)}
.modal-close{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;transition:color .2s}
.modal-close:hover{color:var(--green)}
.modal-search-wrap{padding:.6rem 1.2rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.modal-search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border-b);border-radius:3px;
  color:var(--bright);font-family:'Rajdhani',sans-serif;font-size:14px;padding:7px 12px;outline:none;transition:border-color .2s}
.modal-search-wrap input:focus{border-color:var(--green-mid)}
.modal-search-wrap input::placeholder{color:var(--txt2)}
.dummy-btn{padding:6px;background:var(--bg-s);border:1px solid var(--border);border-radius:3px;
  color:var(--txt2);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;cursor:pointer;
  transition:all .2s;text-transform:uppercase;text-align:left}
.dummy-btn:hover{border-color:var(--green-dark);color:var(--green)}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:5px;
  padding:.8rem 1.2rem;overflow-y:auto;flex:1}
.champ-tile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  padding:4px;border-radius:4px;border:1px solid transparent;transition:all .2s}
.champ-tile:hover{border-color:var(--border-b);background:var(--bg-s)}
.champ-tile img{width:46px;height:46px;border-radius:4px;object-fit:cover}
.champ-tile span{font-size:8px;color:var(--txt2);text-align:center;line-height:1.2}

@media(max-width:768px){
  #runes-row,#champs-row,#spells-row{grid-template-columns:1fr}
  .rune-panel.rp-right,div[class*="cp-right"],div[class*="sp-right"]{border-right:none;border-top:1px solid var(--border)}
  .spells-cards{flex-wrap:wrap}
}
</style>
</head>

<div id="shop-wrap">

<!-- ══ ROW 4: SPELLS ════════════════════════════════════════ -->

<script>
// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════
const DDR_BASE  = 'https://ddragon.leagueoflegends.com/cdn/14.24.1/';
const RUNE_IMG  = 'https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/';

  'Ravenous Hydra':     {cat:'fighter',img:'3074.png',cost:3300,stats:{ad:70,ahi:20,lifesteal:0.08}},
  'Titanic Hydra':      {cat:'fighter',img:'3748.png',cost:3300,stats:{hp:500,ad:40}},

async function loadChamps() {
  try {
    const r = await fetch(DDR_BASE+'data/en_US/championFull.json');
    const d = await r.json();
    Object.values(d.data).forEach(c => {
      S.allChamps[c.id] = { id:c.id, name:c.name, key:c.key,
        img: DDR_BASE+'img/champion/'+c.image.full,
        loadingImg: 'https://ddragon.leagueoflegends.com/cdn/img/champion/loading/'+c.id+'_0.jpg',
        stats:c.stats, spells:c.spells, passive:c.passive };
    });
    S.champArr = Object.values(S.allChamps).sort((a,b)=>a.name.localeCompare(b.name));
    renderChampGrid(S.champArr);
  } catch(e){ console.warn('DDragon failed',e); }
}

// STATS CALCULATION
// ════════════════════════════════════════════════════════════
function computeStats(side) {
  const sd = S.sides[side], lvl = sd.level;
  let b = {};
  if (!sd.champ) {
    b = {maxHP:1000,hp:1000,bonusHP:0,totalAD:0,bonusAD:0,ap:0,armor:50,bonusArmor:0,mr:50,bonusMR:0,
         as:0.6,ms:340,lifesteal:0,mana:0,crit:0,ahi:0,armorpen:0,magicpen:0,level:lvl};
  } else {
    const cs = sd.champ.stats;
    const baseHP  = cs.hp + cs.hpperlevel*(lvl-1);
    const baseAD  = cs.attackdamage + cs.attackdamageperlevel*(lvl-1);
    const baseAr  = cs.armor + cs.armorperlevel*(lvl-1);
    const baseMR  = cs.spellblock + cs.spellblockperlevel*(lvl-1);
    const baseAS  = cs.attackspeed*(1+cs.attackspeedperlevel/100*(lvl-1));
    b = {maxHP:baseHP,hp:baseHP,bonusHP:0,totalAD:baseAD,bonusAD:0,ap:0,
         armor:baseAr,bonusArmor:0,mr:baseMR,bonusMR:0,as:baseAS,
         ms:cs.movespeed||340,lifesteal:0,mana:cs.mp||0,crit:0,ahi:0,
         armorpen:0,magicpen:0,level:lvl};
  }
  // Items
  sd.items.forEach(name => {
    if (!name||!ITEMS[name]) return;
    const st = ITEMS[name].stats;
    if (st.hp)     { b.bonusHP+=st.hp; b.maxHP+=st.hp; b.hp+=st.hp; }
    if (st.ad)     { b.bonusAD+=st.ad; b.totalAD+=st.ad; }
    if (st.ap)     b.ap+=st.ap;
    if (st.armor)  { b.bonusArmor+=st.armor; b.armor+=st.armor; }
    if (st.mr)     { b.bonusMR+=st.mr; b.mr+=st.mr; }
    if (st.as)     b.as+=st.as;
    if (st.ms)     b.ms+=st.ms;
    if (st.lifesteal) b.lifesteal+=st.lifesteal;
    if (st.mana)   b.mana+=st.mana;
    if (st.crit)   b.crit+=st.crit;
    if (st.ahi)    b.ahi+=st.ahi;
    if (st.magicpen) b.magicpen=(b.magicpen||0)+st.magicpen;
  });
  if (sd.items.includes('Manamune')) b.totalAD+=b.mana*0.02;
  if (sd.items.includes("Overlord's Bloodmail")) b.totalAD+=b.bonusHP*0.025;
  if (sd.items.includes("Rabadon's Deathcap")) b.ap*=1.35;
  // Runes
  const applyB = (bonus) => {
    if (!bonus) return;
    if (bonus.hp) { b.maxHP+=bonus.hp; b.hp+=bonus.hp; }
    if (bonus.ad) { b.totalAD+=bonus.ad; b.bonusAD+=bonus.ad; }
    if (bonus.ap) b.ap+=bonus.ap;
    if (bonus.armor) b.armor+=bonus.armor;
    if (bonus.mr) b.mr+=bonus.mr;
    if (bonus.as) b.as+=bonus.as;
    if (bonus.ms) b.ms+=bonus.ms;
    if (bonus.lifesteal) b.lifesteal+=bonus.lifesteal;
    if (bonus.mana) b.mana+=bonus.mana;
    if (bonus.ahi) b.ahi+=bonus.ahi;
  };
  const runes = sd.runes;
  const tree = TREES[runes.priTree];
  const ks = tree.ks.find(k=>k.id===runes.ks);
  if (ks?.b) applyB(ks.b(b));
  runes.pri.forEach((rid,i) => {
    if (!rid||!tree.rows[i]) return;
    const rune = tree.rows[i].find(r=>r.id===rid);
    if (rune?.b) applyB(rune.b(b));
  });
  const secTree = TREES[runes.secTree];
  runes.sec.forEach(rid => {
    for (const row of secTree.rows) {
      const rune = row.find(r=>r.id===rid);
      if (rune?.b) { applyB(rune.b(b)); break; }
    }
  });
  runes.sh.forEach(sh => {
    if (sh==='ad') { b.totalAD+=5; b.bonusAD+=5; }
    else if (sh==='ap') b.ap+=8;
    else if (sh==='as') b.as+=0.10;
    else if (sh==='hp') { b.maxHP+=65; b.hp+=65; }
    else if (sh==='armor') b.armor+=9;
    else if (sh==='mr') b.mr+=8;
  });
  return b;
}

function mitigPhys(raw, armor, pen=0) {
  const eff = Math.max(0, armor - pen);
  return Math.max(0, Math.round(raw * 100/(100+eff)));
}
function mitigMag(raw, mr, pen=0) {
  const eff = Math.max(0, mr - pen);
  return Math.max(0, Math.round(raw * 100/(100+eff)));
}

// ── CHAMPION PANEL ──────────────────────────────────────────
function renderChampPanel(side) {
  const sd = S.sides[side];
  const s  = computeStats(side);
  const isRight = side === 'right';
  const el = document.getElementById('cp-'+side);
  const name = sd.champ ? sd.champ.name : 'Mannequin';
  const encoded = name !== 'Mannequin' && !!CHAMP_SPELLS[name];
  const color = side==='left' ? 'var(--blue)' : 'var(--orange)';
  const accentBorder = side==='left' ? '#4A9EDE55' : '#E06B4A55';

  const portraitHtml = sd.champ
    ? `<img src="${sd.champ.loadingImg}" style="width:100%;height:100%;object-fit:cover;object-position:top center"
        onerror="this.src='${sd.champ.img}'"/>`
    : dummySVG(side);

  const statsHtml = [
    ['HP', Math.round(s.maxHP), s.bonusHP>0],
    ['AD', Math.round(s.totalAD), s.bonusAD>0],
    ['AP', Math.round(s.ap), s.ap>0],
    ['Armure', Math.round(s.armor), s.bonusArmor>0],
    ['RM', Math.round(s.mr), s.bonusMR>0],
    ['AS', s.as.toFixed(2), false],
    ['Crit', Math.round((s.crit||0)*100)+'%', s.crit>0],
    ['MS', Math.round(s.ms), false],
  ].map(([k,v,g])=>`<div class="sm-row"><span class="sm-key">${k}</span><span class="sm-val${g?' green':''}">${v}</span></div>`).join('');

  el.innerHTML = `
    <div class="champ-portrait-wrap" onclick="openModal('${side}')">
      <div class="champ-portrait" style="border-color:${accentBorder}">${portraitHtml}</div>
    </div>
    <div class="champ-info">
      <div class="champ-name-row">
        <span class="champ-name" style="color:${color}">${name}</span>
        ${encoded ? `<span class="champ-encoded-badge">✓ Encodé</span>` : ''}
      </div>
      <div class="champ-change" onclick="openModal('${side}')">Changer de champion →</div>
      <div class="level-row">
        <span class="level-lbl">Niv</span>
        <input type="range" class="level-slider" min="1" max="18" value="${sd.level}"
          oninput="setLevel('${side}',this.value)"/>
        <span id="lv-${side}" style="font-family:'Cinzel',serif;font-size:11px;color:var(--green);min-width:18px">${sd.level}</span>
      </div>
      <div class="stats-mini">${statsHtml}</div>
    </div>`;
}

// ── RUNE PANEL ──────────────────────────────────────────────
function renderRunePanel(side) {
  const el = document.getElementById('rp-'+side);
  const runes = S.sides[side].runes;
  const tree = TREES[runes.priTree];
  const secTree = TREES[runes.secTree];
  const color = side==='left' ? 'var(--blue)' : 'var(--orange)';

  const treeDotsHtml = Object.entries(TREES).map(([tk,t])=>
    `<div class="tree-dot td-${tk} ${runes.priTree===tk?'active':''}"
      onclick="setPriTree('${side}','${tk}')" title="${t.name}"></div>`
  ).join('');

  const ksHtml = tree.ks.map(k=>
    `<div class="rune-ic rk ${runes.ks===k.id?'sel':''}" onclick="setKS('${side}','${k.id}')" title="${k.n}">
      <img src="${k.img}" onerror="this.style.background='var(--border)'"/></div>`
  ).join('');

  const priRowsHtml = tree.rows.map((row,ri)=>
    `<div class="rune-row-h">${row.map(r=>
      `<div class="rune-ic ${runes.pri[ri]===r.id?'sel':''}" onclick="setPriRune('${side}',${ri},'${r.id}')" title="${r.n}">
        <img src="${r.img}" onerror="this.style.background='var(--border)'"/></div>`
    ).join('')}</div>`
  ).join('');

  const secDotsHtml = Object.entries(TREES).filter(([k])=>k!==runes.priTree).map(([tk,t])=>
    `<div class="tree-dot td-${tk} ${runes.secTree===tk?'active':''}"
      onclick="setSecTree('${side}','${tk}')" title="${t.name}"></div>`
  ).join('');

  const secRowsHtml = secTree.rows.map(row=>
    `<div class="rune-row-h">${row.map(r=>
      `<div class="rune-ic ${runes.sec.includes(r.id)?'sel':''}" onclick="setSecRune('${side}','${r.id}')" title="${r.n}">
        <img src="${r.img}" onerror="this.style.background='var(--border)'"/></div>`
    ).join('')}</div>`
  ).join('');

  const shardOpts = [['ad','AD+5'],['ap','AP+8'],['as','+AS'],['hp','HP+65'],['armor','Arm+9'],['mr','MR+8']];
  const shardsHtml = [0,1,2].map(si=>
    `<div class="shard-row">${shardOpts.map(([id,lbl])=>
      `<button class="shard-b ${runes.sh[si]===id?'sel':''}" onclick="setShard('${side}',${si},'${id}')">${lbl}</button>`
    ).join('')}</div>`
  ).join('');

  el.innerHTML = `
    <div class="rp-header">
      <span class="rp-title" style="color:${color}">${side==='left'?'⚔ Mon champion':'🛡 Ennemi'} — ${tree.name}</span>
      <div class="tree-dots">${treeDotsHtml}</div>
    </div>
    <div class="rune-row-h">${ksHtml}</div>
    ${priRowsHtml}
    <div class="sec-sep">
      <div class="rune-row-h" style="align-items:center">
        <span style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;color:var(--txt2);margin-right:4px">SEC</span>
        ${secDotsHtml}
      </div>
      ${secRowsHtml}
    </div>
    <div class="rune-row-h" style="margin-top:.3rem"><span style="font-family:'Cinzel',serif;font-size:8px;color:var(--txt2);margin-right:4px">Fragments</span></div>
    ${shardsHtml}`;
}

  const el = document.getElementById('sc-'+side);

  const encoded = name && CHAMP_SPELLS[name];

  if (!name && !sd.champ) {
    el.innerHTML = `<div style="color:var(--txt2);font-size:12px;padding:.5rem">Sélectionne un champion pour voir ses sorts</div>`;
    return;
  }

  const ddSpells = sd.champ?.spells || [];
  const ddPassive = sd.champ?.passive;

  const spellKeys = ['passive','Q','W','E','R'];
  el.innerHTML = spellKeys.map((key, ki) => {
    const isPassive = key === 'passive';
    const rank = isPassive ? 1 : (sd.ranks[key] || 1);
    const maxRank = key==='R' ? 3 : isPassive ? 1 : 5;
    const ddSpell = isPassive ? null : ddSpells[ki-1];
    const ddP = isPassive ? ddPassive : null;

    // Image
    let imgSrc = '';
    if (isPassive && ddP) imgSrc = DDR_BASE+'img/passive/'+ddP.image.full;
    else if (ddSpell) imgSrc = DDR_BASE+'img/spell/'+ddSpell.image.full;

    // Name
    let spellName = isPassive ? (ddP?.name||'Passif') : (encoded?.[key]?.name || ddSpell?.name || key);

    // CD & Cost
    let cdStr = '', costStr = '';
    if (!isPassive) {
      if (encoded?.[key]?.cd) {
        const cd = encoded[key].cd;
        cdStr = cd[rank-1] + 's';
      } else if (ddSpell?.cooldown) {
        const cds = ddSpell.cooldown;
        cdStr = (cds[Math.min(rank-1,cds.length-1)]||0) + 's';
      }
      if (encoded?.[key]?.cost) {
        const cost = encoded[key].cost;
        costStr = cost[rank-1] > 0 ? cost[rank-1]+' mana' : 'Sans coût';
      } else if (ddSpell?.cost) {
        const costs = ddSpell.cost;
        const cv = costs[Math.min(rank-1,costs.length-1)]||0;
        costStr = cv > 0 ? cv+' mana' : 'Sans coût';
      }
    }

    // Description (short)
    let desc = '';
    if (isPassive) desc = ddP?.description || '';
    else desc = ddSpell?.description || '';
    // Clean HTML tags
    desc = desc.replace(/<[^>]+>/g,'').replace(/\{\{[^}]+\}\}/g,'?');
    if (desc.length > 90) desc = desc.slice(0,87)+'…';

    // Damage
    let dmgHtml = '';
    if (encoded?.[key]) {
      const res = encoded[key].fn(s, t, rank);
      let mitigated = res.dmg;
      if (res.dmg > 0) {
        if (res.type==='phys') mitigated = mitigPhys(res.dmg, t.armor, s.armorpen||0);
        else if (res.type==='magic') mitigated = mitigMag(res.dmg, t.mr, s.magicpen||0);
      }
      const typeColor = res.type==='phys'?'var(--gold)':res.type==='magic'?'#8B9EFF':'var(--bright)';
      const typeLabel = res.type==='phys'?'⚔ Phys':res.type==='magic'?'✨ Mag':'◆ Vrai';
      if (res.dmg > 0) {
        dmgHtml = `<div style="font-size:12px;font-weight:700;color:${typeColor}">${typeLabel}: ${mitigated}</div>
        <div style="font-size:9px;color:var(--txt2)">Brut: ${res.dmg}</div>`;
      } else {
        dmgHtml = `<div style="font-size:10px;color:var(--txt2);font-style:italic">${res.note||'Utilitaire'}</div>`;
      }
      if (res.note && res.dmg > 0) dmgHtml += `<div class="sc-note">${res.note}</div>`;
    } else if (name && !encoded) {
      dmgHtml = `<div class="sc-no-encode">Champion non encodé</div>`;
    }

    // Rank pips
    const pipsHtml = !isPassive ? `<div class="rank-pips">
      ${Array.from({length:maxRank},(_,j)=>
        `<div class="rp-pip ${j<rank?'active':''}" onclick="setRank('${side}','${key}',${j+1})" title="Rang ${j+1}"></div>`
      ).join('')}
    </div>` : '';

    return `<div class="spell-card">
      <div class="sc-top">
        <div class="sc-icon">${imgSrc?`<img src="${imgSrc}" onerror="this.style.background='var(--border)'"/>`:`<span style="font-family:'Cinzel',serif;font-size:10px;color:var(--txt2)">${key}</span>`}</div>
        <div>
          <span class="sc-key k-${key}">${key}</span>
          ${pipsHtml}
        </div>
      </div>
      <div class="sc-name" title="${spellName}">${spellName}</div>
      ${cdStr ? `<div class="sc-cd">⏱ <b>${cdStr}</b>${costStr?' · '+costStr:''}</div>` : ''}
      <div class="sc-desc">${desc}</div>
      ${dmgHtml}
    </div>`;
  }).join('');
}

// ── SHOP ────────────────────────────────────────────────────
function renderItemSlotsDisplay() {
  const side = S.configSide;
  const sd = S.sides[side];
  const el = document.getElementById('item-slots-display');
  el.innerHTML = sd.items.map((name,i)=>{
    const item = name && ITEMS[name];
    const isActive = sd.activeSlot === i;
    return `<div class="item-slot ${isActive?'active-slot':''}" onclick="clickSlot('${side}',${i})"
      onmouseenter="${item?`showTT(event,'${name}')`:'(()=>{})()'}" onmouseleave="hideTT()">
      ${item ? `<img src="${DDR_BASE+'img/item/'+item.img}"/>
        <span class="slot-x" onclick="removeItem('${side}',${i},event)">✕</span>`
      : `<div class="slot-empty-dot"></div>`}
    </div>`;
  }).join('');
  renderShop();
}

function renderShop() {
  const q = document.getElementById('shop-search').value.toLowerCase();
  const cat = S.shopCat;
  const filtered = Object.entries(ITEMS).filter(([n,item])=>{
    if (cat!=='all' && item.cat!==cat) return false;
    if (q && !n.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('shop-grid').innerHTML = filtered.map(([name,item])=>
    `<div class="shop-item" onclick="buyItem('${name}')"
      onmouseenter="showTT(event,'${name}')" onmouseleave="hideTT()">
      <img src="${DDR_BASE+'img/item/'+item.img}" onerror="this.style.background='var(--border)'"/>
    </div>`
  ).join('');
}

// ── CHAMPION GRID ────────────────────────────────────────────
function renderChampGrid(arr) {
  document.getElementById('champ-grid').innerHTML = arr.map(c=>
    `<div class="champ-tile" onclick="selectChamp('${c.id}')">
      <img src="${c.loadingImg||c.img}" onerror="this.src='${c.img}'" style="object-position:top center"/>
      <span>${c.name}</span>
    </div>`
  ).join('');
}

// ── TRAINING DUMMY SVG ──────────────────────────────────────
function dummySVG(side) {
  const c = side==='left' ? '#4ADE80' : '#E06B4A';
  const f = side==='left' ? '#2a4a2a' : '#4a2a2a';
  return `<svg viewBox="0 0 100 130" fill="none" style="width:100%;height:100%">
    <circle cx="50" cy="22" r="18" fill="${f}" stroke="${c}" stroke-width="1.5"/>
    <text x="50" y="28" text-anchor="middle" fill="${c}" font-size="18" font-family="sans-serif">?</text>
    <rect x="28" y="42" width="44" height="48" rx="6" fill="${f}" stroke="${c}" stroke-width="1.5"/>
    <rect x="10" y="44" width="18" height="8" rx="4" fill="${f}" stroke="${c}" stroke-width="1"/>
    <rect x="72" y="44" width="18" height="8" rx="4" fill="${f}" stroke="${c}" stroke-width="1"/>
    <rect x="34" y="90" width="12" height="36" rx="5" fill="${f}" stroke="${c}" stroke-width="1"/>
    <rect x="54" y="90" width="12" height="36" rx="5" fill="${f}" stroke="${c}" stroke-width="1"/>
    <rect x="46" y="52" width="8" height="28" fill="${c}" opacity=".25"/>
    <rect x="36" y="62" width="28" height="8" fill="${c}" opacity=".25"/>
  </svg>`;
}

// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════
function setConfigSide(side) {
  S.configSide = side;
  document.querySelectorAll('.side-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('.'+side+'-tab').classList.add('active');
  renderItemSlotsDisplay();
}
function clickSlot(side, i) {
  S.sides[side].activeSlot = S.sides[side].activeSlot===i ? null : i;
  renderItemSlotsDisplay();
}
function buyItem(name) {
  const side = S.configSide, sd = S.sides[side];
  const slot = sd.activeSlot;
  if (slot !== null) { sd.items[slot] = name; sd.activeSlot = null; }
  else { const e = sd.items.findIndex(x=>x===null); if (e!==-1) sd.items[e]=name; }
  renderAll();
}
function removeItem(side, i, e) {
  e.stopPropagation();
  S.sides[side].items[i] = null;
  renderAll();
}
function setCat(btn, cat) {
  S.shopCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderShop();
}
function setLevel(side, v) {
  S.sides[side].level = parseInt(v);
  document.getElementById('lv-'+side).textContent = v;
  renderAll();
}
function setRank(side, spell, rank) { S.sides[side].ranks[spell]=rank; renderAll(); }

// Rune handlers
function setPriTree(side, tree) {
  const r = S.sides[side].runes;
  r.priTree = tree;
  const t = TREES[tree];
  r.ks = t.ks[0].id;
  r.pri = t.rows.map(row=>row[0].id);
  if (r.secTree===tree) {
    const other = Object.keys(TREES).find(k=>k!==tree);
    r.secTree = other;
    const st = TREES[other];
    r.sec = [st.rows[0][0].id, st.rows[1]?.[0]?.id||''];
  }
  renderAll();
}
function setKS(side, id) { S.sides[side].runes.ks=id; renderAll(); }
function setPriRune(side, ri, id) { S.sides[side].runes.pri[ri]=id; renderAll(); }
function setSecTree(side, tree) {
  const r = S.sides[side].runes;
  r.secTree = tree;
  const st = TREES[tree];
  r.sec = [st.rows[0][0].id, st.rows[1]?.[0]?.id||''];
  renderAll();
}
function setSecRune(side, id) {
  const sec = S.sides[side].runes.sec;
  const idx = sec.indexOf(id);
  if (idx!==-1) sec[idx]='';
  else if (!sec[0]) sec[0]=id;
  else if (!sec[1]) sec[1]=id;
  else sec[0]=id;
  renderAll();
}
function setShard(side, si, id) { S.sides[side].runes.sh[si]=id; renderAll(); }

// Modal
function openModal(side) {
  S.modalSide = side;
  document.getElementById('modal-title').textContent = side==='left'?'Choisir mon champion':'Choisir l\'ennemi';
  document.getElementById('champ-modal').classList.add('open');
  document.getElementById('modal-input').value='';
  renderChampGrid(S.champArr);
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}
function closeModal() { document.getElementById('champ-modal').classList.remove('open'); }
function filterModal() {
  const q = document.getElementById('modal-input').value.toLowerCase();
  renderChampGrid(q ? S.champArr.filter(c=>c.name.toLowerCase().includes(q)) : S.champArr);
}
function selectChamp(id) {
  const side = S.modalSide, champ = S.allChamps[id];
  S.sides[side].champ = champ;
  const def = DEF_RUNES[champ.name];
  if (def) {
    const r = S.sides[side].runes;
    r.priTree=def.pri; r.ks=def.ks; r.pri=[...def.p];
    r.secTree=def.sec; r.sec=[...def.s];
    if (def.sh) r.sh=[...def.sh];
  }
  closeModal(); renderAll();
}
function selectDummy() {
  S.sides[S.modalSide].champ = null;
  closeModal(); renderAll();
}

// Tooltip
function showTT(e, name) {
  const item = ITEMS[name]; if (!item) return;
  const stats = Object.entries(item.stats).map(([k,v])=>{
    const lbl = {hp:'HP',ad:'AD',ap:'AP',armor:'Armure',mr:'RM',as:'AS',ms:'MS',
                 lifesteal:'Lifesteal',mana:'Mana',crit:'Crit',ahi:'Haste',magicpen:'Mag Pen'}[k]||k;
    const isPct = ['as','lifesteal','crit'].includes(k);
    return `<div class="tt-stat">${lbl}: <b style="color:var(--bright)">+${isPct?Math.round(v*100)+'%':v}</b></div>`;
  }).join('');
  const tip = document.getElementById('tt');
  tip.innerHTML = `<div class="tt-name">${name}</div>${stats}
    ${item.passive?`<div class="tt-pass">${item.passive}</div>`:''}
    ${item.cost?`<div class="tt-cost">${item.cost}g</div>`:''}`;
  tip.style.display='block';
  tip.style.left=Math.min(e.clientX+14, window.innerWidth-220)+'px';
  tip.style.top=Math.max(4, e.clientY-10)+'px';
}
function hideTT() { document.getElementById('tt').style.display='none'; }

// Modal bg click
document.getElementById('champ-modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('champ-modal')) closeModal();
});

async function logout() {
  await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
  window.location.href='/login.html';
}

// ════════════════════════════════════════════════════════════
(async ()=>{
  await loadChamps();
  renderAll();
})();
</script>
