<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Champion Simulator — Urgot Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4ADE80;--green-mid:#22C55E;--green-dark:#15803D;
  --bg:#060D07;--bg-s:#0B1A0D;--bg-c:#0F2211;--bg-c2:#132417;
  --border:#1A3D1E;--border-b:#2D6A33;
  --txt:#A8D4A0;--txt2:#4A7550;--bright:#E8F5E2;
  --gold:#C89B3C;--red:#C84B4B;--acid:rgba(74,222,128,.2);
  --blue:#4A9EDE;--orange:#E06B4A;
  --acid-glow:rgba(74,222,128,.3);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;overflow-x:hidden;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(26,61,30,.05) 50px),
  repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(26,61,30,.05) 50px);}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:2px}

/* NAV */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 2rem;background:rgba(6,13,7,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.nav-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.2em;color:var(--green);text-decoration:none}
.nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center}
.nav-links a{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--green)}
.btn-nav{background:none;border:1px solid var(--border);border-radius:3px;color:var(--txt2);
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;cursor:pointer;transition:all .2s}
.btn-nav:hover{border-color:var(--green-dark);color:var(--green)}

/* ROW DIVIDERS */
.row-div{display:flex;align-items:center;gap:10px;padding:0 1.5rem;height:24px;
  background:var(--bg-c2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.row-div::before,.row-div::after{content:'';flex:1;height:1px;background:var(--border)}
.row-div span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--txt2);white-space:nowrap}

/* SHOP */
#shop-wrap{background:var(--bg-c);border-bottom:1px solid var(--border);padding:.7rem 1.5rem}
.shop-top{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;flex-wrap:wrap}
.side-tabs{display:flex;gap:5px}
.side-tab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 14px;border-radius:3px;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.side-tab.left-tab{color:var(--blue);border-color:#4A9EDE33}
.side-tab.right-tab{color:var(--orange);border-color:#E06B4A33}
.side-tab.active.left-tab{background:#4A9EDE18;border-color:var(--blue)}
.side-tab.active.right-tab{background:#E06B4A18;border-color:var(--orange)}
.item-slots{display:flex;gap:5px}
.slot{width:42px;height:42px;border:2px dashed var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:.18s;flex-shrink:0;background:var(--bg-s)}
.slot:hover{border-color:var(--green-mid)}
.slot.active-slot{border-style:solid;border-color:var(--green);box-shadow:0 0 12px var(--acid-glow)}
.slot img{width:100%;height:100%;object-fit:cover}
.slot .sph{font-size:10px;color:var(--txt2)}
.slot .rm{position:absolute;top:0;right:0;width:14px;height:14px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;opacity:0;transition:.15s}
.slot:hover .rm{opacity:1}
.shop-filters{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.shop-search{background:var(--bg);border:1px solid var(--border-b);border-radius:3px;color:var(--bright);
  font-family:'Rajdhani',sans-serif;font-size:13px;padding:4px 10px;outline:none;width:150px;transition:border-color .2s}
.shop-search:focus{border-color:var(--green-mid)}
.shop-search::placeholder{color:var(--txt2)}
.scat{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;padding:4px 9px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;text-transform:uppercase;transition:.15s;display:flex;align-items:center;gap:4px}
.scat .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.scat.on{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.scat:hover:not(.on){color:var(--txt);border-color:var(--border-b)}
.shop-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;margin-top:.5rem}
.shop-item{width:40px;height:40px;border:1px solid var(--border);border-radius:3px;cursor:pointer;overflow:hidden;transition:border-color .15s,transform .12s;background:var(--bg-s);flex-shrink:0}
.shop-item:hover{border-color:var(--green-mid);transform:scale(1.08);z-index:10}
.shop-item img{width:100%;height:100%;object-fit:cover}
.shop-loading{padding:1rem;color:var(--txt2);font-size:12px}

/* TOOLTIP */
.itooltip{position:fixed;z-index:9999;pointer-events:none;display:none;background:linear-gradient(180deg,var(--bg-c2),var(--bg-c));border:1px solid var(--border-b);border-radius:4px;padding:11px 14px;min-width:200px;max-width:260px;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.itooltip.show{display:block}
.tt-name{font-family:'Cinzel',serif;font-weight:700;font-size:12px;color:var(--green);letter-spacing:.08em;margin-bottom:3px}
.tt-gold{font-size:11px;color:var(--gold);margin-bottom:8px}
.tt-stats{display:flex;flex-direction:column;gap:3px}
.tt-stat{display:flex;justify-content:space-between;font-size:11px;gap:10px}
.tt-stat .tk{color:var(--txt2)}.tt-stat .tv{color:var(--bright);font-weight:600;font-family:'Cinzel',serif;font-size:11px}
.tt-note{font-size:11px;color:var(--txt2);margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);line-height:1.4}
.tt-note b{color:var(--green)}

/* RUNES ROW */
#runes-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.rune-panel{padding:.7rem 1rem;border-right:1px solid var(--border);overflow:hidden}
.rune-panel.rp-right{border-right:none}
.rp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem}
.rune-tree{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px}
.rune-tree.sec{border-color:#1a3a42}
.tree-hd{font-family:'Cinzel',serif;font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:8px;color:var(--bright)}
.tree-hd img{width:18px;height:18px}
.tree-hd.s{color:var(--blue)}
.tree-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ttab{width:28px;height:28px;border:1px solid var(--border);background:var(--bg-c);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:3px}
.ttab img{width:100%;height:100%;object-fit:contain;filter:grayscale(.8) opacity(.5);transition:.15s}
.ttab:hover img{filter:grayscale(.2) opacity(.8)}
.ttab.op{border-color:var(--green);box-shadow:0 0 6px var(--acid-glow)}.ttab.op img{filter:none}
.ttab.os{border-color:var(--blue);box-shadow:0 0 6px rgba(74,158,222,.3)}.ttab.os img{filter:none}
.ttab.dis{opacity:.2;pointer-events:none}
.rlbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt2);margin:8px 0 5px;display:flex;align-items:center;gap:6px}
.rlbl::after{content:"";flex:1;height:1px;background:var(--border)}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.rbtn{border:1px solid var(--border);background:var(--bg-c);border-radius:3px;cursor:pointer;padding:6px 3px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s;min-height:58px;justify-content:center}
.rbtn img{width:24px;height:24px;border-radius:50%;filter:grayscale(.6) opacity(.55);transition:.15s}
.rbtn .rn{font-family:'Cinzel',serif;font-size:7.5px;line-height:1.15;color:var(--txt2);text-align:center}
.kgrid .rbtn{min-height:72px}.kgrid .rbtn img{width:34px;height:34px}
.rbtn:hover img{filter:grayscale(.1) opacity(.9)}.rbtn:hover .rn{color:var(--txt)}
.rbtn.rp{border-color:var(--green);background:linear-gradient(180deg,rgba(74,222,128,.1),transparent)}.rbtn.rp img{filter:none}.rbtn.rp .rn{color:var(--green)}
.rbtn.rs{border-color:var(--blue);background:linear-gradient(180deg,rgba(74,158,222,.1),transparent)}.rbtn.rs img{filter:none}.rbtn.rs .rn{color:var(--blue)}
.rbtn.locked{opacity:.25;pointer-events:none}
.shards-wrap{margin-top:6px}
.shard-row-r{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.shard-lbl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt2);width:45px;flex-shrink:0}
.shard-opts{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.sbtn{display:flex;align-items:center;gap:4px;padding:3px 7px;background:var(--bg-c);border:1px solid var(--border);color:var(--txt2);cursor:pointer;border-radius:2px;font-size:9px;transition:.15s}
.sbtn img{width:13px;height:13px}
.sbtn:hover{border-color:var(--border-b)}
.sbtn.on{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}

/* CHAMPIONS ROW */
#champs-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.champ-panel{padding:1rem;display:flex;gap:1rem;align-items:flex-start;border-right:1px solid var(--border)}
.champ-panel.cp-right{border-right:none;flex-direction:row-reverse}
.champ-portrait{width:120px;height:150px;border-radius:5px;border:2px solid var(--border-b);overflow:hidden;background:var(--bg-s);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;flex-shrink:0}
.champ-portrait:hover{border-color:var(--green-mid)}
.champ-portrait img{width:100%;height:100%;object-fit:cover;object-position:top center}
.champ-info{flex:1}
.champ-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;color:var(--bright);margin-bottom:.2rem}
.champ-change{font-size:10px;color:var(--txt2);cursor:pointer;transition:color .2s;margin-bottom:.4rem}
.champ-change:hover{color:var(--green)}
.encoded-badge{font-size:8px;padding:2px 6px;border-radius:10px;border:1px solid var(--green-dark);color:var(--green);background:rgba(74,222,128,.08);font-family:'Cinzel',serif;letter-spacing:.1em;display:inline-block;margin-bottom:.4rem}
.level-row{display:flex;align-items:center;gap:6px;margin-bottom:.4rem}
.level-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--txt2)}
.level-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
.level-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg)}
.level-val{font-family:'Cinzel',serif;font-size:11px;color:var(--green);min-width:18px;text-align:center}
.stats-mini{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.sm-row{display:flex;justify-content:space-between;padding:2px 5px;border-radius:2px;font-size:11px}
.sm-row:nth-child(odd){background:rgba(26,61,30,.2)}
.sm-key{color:var(--txt2)}.sm-val{color:var(--bright);font-weight:600}

/* SPELLS ROW */
#spells-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.spells-panel{padding:.7rem 1rem;border-right:1px solid var(--border)}
.spells-panel.sp-right{border-right:none}
.spells-header{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt2);margin-bottom:.5rem}
.spells-cards{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.spell-card{min-width:108px;max-width:135px;flex:1;background:var(--bg-s);border:1px solid var(--border);border-radius:4px;padding:.5rem;display:flex;flex-direction:column;gap:3px}
.sc-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.sc-icon{width:36px;height:36px;border-radius:4px;border:1px solid var(--border-b);overflow:hidden;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sc-icon img{width:100%;height:100%;object-fit:cover}
.sc-key{font-family:'Cinzel',serif;font-size:11px;font-weight:700}
.sc-key.k-P{color:var(--txt2)}.sc-key.k-Q,.sc-key.k-W,.sc-key.k-E{color:var(--green)}.sc-key.k-R{color:var(--gold)}
.sc-name{font-family:'Cinzel',serif;font-size:9px;color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-cd{font-size:10px;color:var(--txt2)}.sc-cd b{color:var(--blue)}
.sc-desc{font-size:9px;color:var(--txt);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-dmg-phys{font-size:12px;font-weight:700;color:var(--gold)}
.sc-dmg-magic{font-size:12px;font-weight:700;color:#8B9EFF}
.sc-dmg-true{font-size:12px;font-weight:700;color:var(--bright)}
.sc-note{font-size:9px;color:var(--txt2);font-style:italic}
.rank-pips{display:flex;gap:2px;margin-top:2px}
.rp-pip{width:12px;height:3px;border-radius:2px;background:var(--border);cursor:pointer;transition:background .12s}
.rp-pip.active{background:var(--green)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg-c);border:1px solid var(--border-b);border-radius:6px;width:min(720px,95vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.9)}
.modal-head{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.2em;color:var(--bright)}
.modal-close{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;transition:color .2s}
.modal-close:hover{color:var(--green)}
.modal-search-wrap{padding:.6rem 1.2rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.modal-search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border-b);border-radius:3px;color:var(--bright);font-family:'Rajdhani',sans-serif;font-size:14px;padding:7px 12px;outline:none;transition:border-color .2s}
.modal-search-wrap input:focus{border-color:var(--green-mid)}
.modal-search-wrap input::placeholder{color:var(--txt2)}
.dummy-btn{padding:6px;background:var(--bg-s);border:1px solid var(--border);border-radius:3px;color:var(--txt2);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;cursor:pointer;transition:all .2s;text-transform:uppercase;text-align:left}
.dummy-btn:hover{border-color:var(--green-dark);color:var(--green)}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:5px;padding:.8rem 1.2rem;overflow-y:auto;flex:1}
.champ-tile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;border-radius:4px;border:1px solid transparent;transition:all .2s}
.champ-tile:hover{border-color:var(--border-b);background:var(--bg-s)}
.champ-tile img{width:48px;height:48px;border-radius:4px;object-fit:cover;object-position:top center}
.champ-tile span{font-size:8px;color:var(--txt2);text-align:center;line-height:1.2}

@media(max-width:768px){#runes-row,#champs-row,#spells-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/guide">Urgot Guide</a>
  <ul class="nav-links">
    <li><a href="/guide/mechanics.html">Mechanics</a></li>
    <li><a href="/guide/matchup.html">Matchup</a></li>
    <li><a href="/guide/build.html">Build Guide</a></li>
    <li><a href="/guide/runes.html">Runes</a></li>
    <li><a href="/guide/calculator.html">Calculator</a></li>
    <li><a href="/guide/simulator.html" class="active">Simulator</a></li>
    <li><button class="btn-nav" onclick="logout()">Déconnexion</button></li>
  </ul>
</nav>

<!-- ROW 1: SHOP -->
<div id="shop-wrap">
  <div class="shop-top">
    <div class="side-tabs">
      <button class="side-tab left-tab active" onclick="setConfigSide('left')">⚔ Mon champion</button>
      <button class="side-tab right-tab" onclick="setConfigSide('right')">🛡 Ennemi</button>
    </div>
    <div class="item-slots" id="item-slots-display"></div>
    <div class="shop-filters">
      <input class="shop-search" id="shop-search" placeholder="Item…" oninput="renderShop()"/>
      <div id="shop-cats"></div>
    </div>
  </div>
  <div class="shop-grid" id="shop-grid"><div class="shop-loading">Chargement des items…</div></div>
</div>

<!-- ROW 2: RUNES -->
<div class="row-div"><span>Runes</span></div>
<div id="runes-row">
  <div class="rune-panel" id="rp-left"></div>
  <div class="rune-panel rp-right" id="rp-right"></div>
</div>

<!-- ROW 3: CHAMPIONS -->
<div class="row-div"><span>Champions &amp; Stats</span></div>
<div id="champs-row">
  <div class="champ-panel" id="cp-left"></div>
  <div class="champ-panel cp-right" id="cp-right"></div>
</div>

<!-- ROW 4: SPELLS -->
<div class="row-div"><span>Sorts &amp; Dégâts</span></div>
<div id="spells-row">
  <div class="spells-panel" id="sp-left">
    <div class="spells-header" style="color:var(--blue)">⚔ Sorts — Mon champion</div>
    <div class="spells-cards" id="sc-left"></div>
  </div>
  <div class="spells-panel sp-right">
    <div class="spells-header" style="color:var(--orange)">⚔ Sorts — Ennemi</div>
    <div class="spells-cards" id="sc-right"></div>
  </div>
</div>

<div class="modal-bg" id="champ-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Choisir un champion</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search-wrap">
      <input id="modal-input" placeholder="Rechercher un champion…" oninput="filterModal()"/>
      <button class="dummy-btn" onclick="selectDummy()">🎯 Mannequin d'entraînement — 1000 HP · 50 Armure · 50 RM</button>
    </div>
    <div class="champ-grid" id="champ-grid"></div>
  </div>
</div>
<div class="itooltip" id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-gold" id="tt-gold"></div><div class="tt-stats" id="tt-stats"></div><div class="tt-note" id="tt-note"></div></div>

<script>
// ═══════════════════════════════════════════════════════════
// RUNE TREES — CommunityDragon (same as Forge de Build)
// ═══════════════════════════════════════════════════════════
const CD='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/perk-images/styles/';
const SM='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/perk-images/statmods/';
const DDR='https://ddragon.leagueoflegends.com/cdn/14.24.1/';

const TREES={
  precision:{label:'Precision',icon:CD+'7201_precision.png',
    keystones:[
      {id:'pta',n:'Press the Attack',img:CD+'precision/presstheattack/presstheattack.png',s:{}},
      {id:'lt',n:'Lethal Tempo',img:CD+'precision/lethaltempo/lethaltempotemp.png',s:{}},
      {id:'fleet',n:'Fleet Footwork',img:CD+'precision/fleetfootwork/fleetfootwork.png',s:{}},
      {id:'conq',n:'Conqueror',img:CD+'precision/conqueror/conqueror.png',s:{}},
    ],
    rows:[
      [{id:'absorb',n:'Absorb Life',img:CD+'precision/absorblife/absorblife.png',s:{}},
       {id:'triumph',n:'Triumph',img:CD+'precision/triumph.png',s:{hp:20}},
       {id:'pom',n:'Presence of Mind',img:CD+'precision/presenceofmind/presenceofmind.png',s:{mana:200}}],

function getItemCats(nameEN,itemId){
  if(/potion|biscuit|elixir|cookie|refillable/i.test(nameEN||''))return['consumable'];
  const BOOT_IDS=new Set([1001,3006,3009,3020,3047,3111,3158]);
  if(BOOT_IDS.has(+itemId))return['boots'];
  if(/boots|greaves|treads|steelcaps|sorcerer's shoes|swiftness|lucidity|berserker|armored advance|chainlaced|crimson lucidity|gluttonous|gunmetal|immortal path|spellslinger|swiftmarch/i.test(nameEN||''))return['boots'];
  const cats=WL[norm(nameEN||'')];
  return cats&&cats.length?[...cats]:null;
}

async function fetchJSON(urls){
  const list=Array.isArray(urls)?urls:[urls];
  for(const url of list){try{const r=await fetch(url,{mode:'cors'});if(r.ok)return await r.json();}catch(e){}}
  return null;
}

async function loadItems(){
  document.getElementById('shop-grid').innerHTML='<div class="shop-loading">Chargement des items…</div>';
  const vData=await fetchJSON('https://ddragon.leagueoflegends.com/api/versions.json');
  if(Array.isArray(vData)&&vData.length)DDV=vData[0];
  const meraki=await fetchJSON('https://cdn.merakianalytics.com/riot/lol/resources/latest/en-US/items.json');
  const seen=new Set();
  if(meraki){
    ALL_ITEMS=Object.values(meraki).filter(it=>{
      if(!it||!it.id)return false;
      const maps=it.maps||{};if(maps['11']===false)return false;
      const shop=it.shop||{};if(shop.purchasable===false)return false;
      if(it.requiredChampion)return false;
      if(/Trinket|Ward|Oracle|Stealth Ward|Farsight/i.test(it.name||''))return false;
      const total=(shop.prices&&shop.prices.total)||0;
      const isCons=/Potion|Biscuit|Elixir|Cookie/i.test(it.name||'');
      if(!isCons&&total<=0)return false;
      return true;
    }).map(it=>{
      const nameEN=it.name,ddId=it.id;
      const cats=getItemCats(nameEN,ddId);if(!cats)return null;
      const k=norm(nameEN);if(seen.has(k))return null;seen.add(k);
      const s=it.stats||{};
      const man=MAN_IDX[k]||{};
      const pass=PASS_IDX[k]||null;
      const obj={id:ddId,name:nameEN,cats,gold:(it.shop&&it.shop.prices&&it.shop.prices.total)||0,
        img:`https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${ddId}.png`,
        hp:man.hp!==undefined?man.hp:mflat(s,'health'),
        ad:man.ad!==undefined?man.ad:mflat(s,'attackDamage'),
        armor:man.armor!==undefined?man.armor:mflat(s,'armor'),
        mr:man.mr!==undefined?man.mr:mflat(s,'magicResistance'),
        ah:man.ah!==undefined?man.ah:(AH_IDX[k]||0),
        as:man.as!==undefined?man.as:mpct(s,'attackSpeed')/100,
        crit:man.crit!==undefined?man.crit:Math.round(mpct(s,'criticalStrikeChance')),
        ls:man.ls!==undefined?man.ls:Math.round(mpct(s,'lifesteal')),
        ms_flat:man.ms_flat!==undefined?man.ms_flat:mflat(s,'movespeed'),
        ms_pct:man.ms_pct!==undefined?man.ms_pct:mpct(s,'movespeed')/100,
        leth:man.leth!==undefined?man.leth:mflat(s,'lethality'),
        apen:man.apen!==undefined?man.apen:Math.round(mpct(s,'armorPenetration')),
        mana:man.mana!==undefined?man.mana:mflat(s,'mana'),
        ap:man.ap!==undefined?man.ap:0,
        mrpen:man.mrpen||0,mrpen_pct:man.mrpen_pct||0,ten:man.ten||0,
        omni:Math.round(mpct(s,'omnivamp')),
        special:man.special||null,
        passiveKey:pass?nameEN:null,
        applyStats:pass?pass.applyStats:null,
      };
      return obj;
    }).filter(x=>x!==null).sort((a,b)=>a.gold-b.gold||a.name.localeCompare(b.name));
  } else {
    document.getElementById('shop-grid').innerHTML='<div class="shop-loading">Impossible de charger les items.</div>';
    return;
  }
  renderShopCats();
  renderShop();
}

function renderShopCats(){
  const c=document.getElementById('shop-cats');c.innerHTML='';
  CAT_ORDER.forEach(cat=>{const meta=CATS[cat];const b=document.createElement('button');b.className='scat'+(activeCat===cat?' on':'');b.innerHTML=`<span class="dot" style="background:${meta.col}"></span>${meta.fr}`;b.onclick=()=>{activeCat=cat;renderShopCats();renderShop();};c.appendChild(b);});
}

function renderShop(){
  const g=document.getElementById('shop-grid');
  if(!ALL_ITEMS.length){g.innerHTML='<div class="shop-loading">Chargement…</div>';return;}
  const q=(document.getElementById('shop-search').value||'').toLowerCase().trim();
  const list=ALL_ITEMS.filter(it=>(activeCat==='all'||it.cats.includes(activeCat))&&(!q||it.name.toLowerCase().includes(q)));
  if(!list.length){g.innerHTML='<div class="shop-loading">Aucun item trouvé</div>';return;}
  g.innerHTML='';
  list.forEach(it=>{
    const d=document.createElement('div');d.className='shop-item';
    d.innerHTML=`<img src="${it.img}" alt="${it.name}" onerror="this.style.background='var(--border)'"/>`;
    d.onclick=()=>buyItem(it);
    d.addEventListener('mouseenter',e=>showTT(it,e));
    d.addEventListener('mousemove',e=>{const tt=document.getElementById('tooltip');tt.style.left=Math.min(e.clientX+14,window.innerWidth-270)+'px';tt.style.top=Math.max(0,e.clientY-10)+'px';});
    d.addEventListener('mouseleave',hideTT);
    g.appendChild(d);
  });
}

function buyItem(it){
  const side=S.configSide,sd=S.sides[side];
  let slot=sd.activeSlot;
  if(slot===null){slot=sd.items.findIndex(x=>x===null);if(slot<0)slot=0;}
  sd.items[slot]=it;sd.activeSlot=null;
  renderAll();
}

const statRow=(ico,lbl,val)=>`<div class="tt-stat"><span class="tk">${ico} ${lbl}</span><span class="tv">${val}</span></div>`;
function showTT(it,e){
  document.getElementById('tt-name').textContent=it.name;
  document.getElementById('tt-gold').textContent=(it.gold||0)+' gold';
  let rows='';
  if(it.hp)rows+=statRow('❤','HP','+'+Math.round(it.hp));
  if(it.ad)rows+=statRow('⚔','AD','+'+Math.round(it.ad));
  if(it.ap)rows+=statRow('✨','AP','+'+Math.round(it.ap));
  if(it.armor)rows+=statRow('🛡','Armure','+'+Math.round(it.armor));
  if(it.mr)rows+=statRow('🔮','RM','+'+Math.round(it.mr));
  if(it.ah)rows+=statRow('⏱','Ability Haste','+'+it.ah);
  if(it.as)rows+=statRow('⚡','AS','+'+Math.round(it.as*100)+'%');
  if(it.crit)rows+=statRow('🎯','Crit','+'+it.crit+'%');
  if(it.ls)rows+=statRow('🩸','Lifesteal','+'+it.ls+'%');
  if(it.leth)rows+=statRow('🔪','Lethality','+'+Math.round(it.leth));
  if(it.apen)rows+=statRow('🔪','Armor Pen %','+'+it.apen+'%');
  if(it.mrpen_pct)rows+=statRow('🌀','Magic Pen %','+'+it.mrpen_pct+'%');
  if(it.ms_flat)rows+=statRow('💨','MS','+'+it.ms_flat);
  if(it.mana)rows+=statRow('💧','Mana','+'+Math.round(it.mana));
  document.getElementById('tt-stats').innerHTML=rows||'<span style="color:var(--txt2);font-size:11px">Pas de stats directes</span>';
  const noteEl=document.getElementById('tt-note');noteEl.style.display='none';
  const tt=document.getElementById('tooltip');tt.classList.add('show');
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-270)+'px';tt.style.top=Math.max(0,e.clientY-10)+'px';
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}

    const d=await r.json();
    Object.values(d.data).forEach(c=>{
      S.allChamps[c.id]={id:c.id,name:c.name,key:c.key,
        img:DDR+'img/champion/'+c.image.full,
        loadingImg:'https://ddragon.leagueoflegends.com/cdn/img/champion/loading/'+c.id+'_0.jpg',
        stats:c.stats,spells:c.spells,passive:c.passive};
    });
    S.champArr=Object.values(S.allChamps).sort((a,b)=>a.name.localeCompare(b.name));
    renderChampGrid(S.champArr);
  }catch(e){console.warn('DDragon failed',e);}
}

// ═══════════════════════════════════════════════════════════
// STATS AGGREGATION (Forge de Build approach, per-side)
// ═══════════════════════════════════════════════════════════
function findRune(id){
  if(!id)return null;
  for(const k of TREE_KEYS){const t=TREES[k];for(const ks of t.keystones)if(ks.id===id)return ks;for(const row of t.rows)for(const r of row)if(r.id===id)return r;}
  for(const slot of SHARDS)for(const sh of slot)if(sh.id===id)return sh;
  return null;
}

function computeStats(side){
  const sd=S.sides[side],lvl=sd.level;
  let hp,baseHP,ad,baseAD,armor,baseArmor,mr,baseMR,as_,ms,mana,ap=0;
  if(!sd.champ){
    hp=baseHP=1000;ad=baseAD=0;armor=baseArmor=50;mr=baseMR=50;as_=0.6;ms=340;mana=0;
  } else {
    const cs=sd.champ.stats;
    baseHP=cs.hp+cs.hpperlevel*(lvl-1);
    baseAD=cs.attackdamage+cs.attackdamageperlevel*(lvl-1);
    baseArmor=cs.armor+cs.armorperlevel*(lvl-1);
    baseMR=cs.spellblock+cs.spellblockperlevel*(lvl-1);
    const asPerLvl=cs.attackspeedperlevel||0;
    as_=cs.attackspeed*(1+asPerLvl/100*(lvl-1));
    ms=cs.movespeed||340;mana=cs.mp||0;
    hp=baseHP;ad=baseAD;armor=baseArmor;mr=baseMR;
  }
  let bonusHP=0,bonusAD=0,crit=0,ls=0,omni=0,ah=0,leth=0,apen=0,ten=0,mrpen_pct=0,armorShred=0,armPenPct=0;
  const work={ad,baseAD,mana,hp,baseHP,ap,armor,mr,bonusHP,armorShred:0,armPenPct:0};

  // Runes
  [sd.keystone,...sd.pri,...sd.sec,...sd.shards].forEach(id=>{
    const r=findRune(id);if(!r||!r.s)return;const s=r.s;
    if(s.hp==='scale'){const v=shardScaleHP(lvl);work.hp+=v;bonusHP+=v;}else if(s.hp){work.hp+=s.hp;bonusHP+=s.hp;}
    if(s.ad){work.ad+=s.ad;bonusAD+=s.ad;}
    if(s.armor)work.armor+=s.armor;
    if(s.mr)work.mr+=s.mr;
    if(s.as)as_=as_*(1+s.as);
    if(s.ls)ls+=s.ls;
    if(s.ah)ah+=s.ah;
    if(s.ms)ms+=s.ms;
    if(s.leth)leth+=s.leth;
    if(s.mana)work.mana+=s.mana;
  });

  // Items
  sd.items.forEach(it=>{
    if(!it)return;
    if(it.hp){work.hp+=it.hp;bonusHP+=it.hp;}
    if(it.ad){work.ad+=it.ad;bonusAD+=it.ad;}
    if(it.ap)work.ap+=it.ap;
    if(it.armor)work.armor+=it.armor;
    if(it.mr)work.mr+=it.mr;
    if(it.ah)ah+=it.ah;
    if(it.as)as_=as_*(1+it.as);
    if(it.crit)crit+=it.crit;
    if(it.ls)ls+=it.ls;
    if(it.ms_flat)ms+=it.ms_flat;
    if(it.ms_pct)ms=Math.floor(ms*(1+it.ms_pct));
    if(it.leth)leth+=it.leth;
    if(it.apen)apen+=it.apen;
    if(it.mana)work.mana+=it.mana;
    if(it.mrpen_pct)mrpen_pct+=it.mrpen_pct;
    if(it.ten)ten+=it.ten;
    work.bonusHP=bonusHP;
    if(it.applyStats)it.applyStats(work);
  });
  as_=Math.min(as_,2.5);crit=Math.min(crit,100);

  return {
    level:lvl,hp:Math.round(work.hp),maxHP:Math.round(work.hp),
    ad:work.ad,totalAD:work.ad,baseAD,bonusAD:work.ad-baseAD,
    ap:work.ap,
    armor:work.armor,baseArmor,bonusArmor:work.armor-baseArmor,
    mr:work.mr,baseMR,bonusMR:work.mr-baseMR,
    as:as_,ms,crit,ls,ah,leth,apen,mana:work.mana,mrpen_pct,
    armorShred:work.armorShred||0,armPenPct:work.armPenPct||0,
  };
}

function mitigPhys(raw,armor,pen=0,pctPen=0){const eff=Math.max(0,armor*(1-pctPen)-pen);return Math.max(0,Math.round(raw*100/(100+eff)));}
function mitigMag(raw,mr,pen_pct=0){const eff=Math.max(0,mr*(1-pen_pct/100));return Math.max(0,Math.round(raw*100/(100+eff)));}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderAll(){
  renderItemSlots();
  renderChampPanel('left');
  renderChampPanel('right');
  renderRunePanel('left');
  renderRunePanel('right');
  renderSpells('left');
  renderSpells('right');
}

// ── ITEM SLOTS ──────────────────────────────────────────────
function renderItemSlots(){
  const side=S.configSide,sd=S.sides[side];
  const el=document.getElementById('item-slots-display');
  el.innerHTML=sd.items.map((it,i)=>{
    const isActive=sd.activeSlot===i;
    return `<div class="slot ${isActive?'active-slot':''}" onclick="clickSlot('${side}',${i})">
      ${it?`<img src="${it.img}" title="${it.name}"/><span class="rm" onclick="removeItem('${side}',${i},event)">✕</span>`:'<span class="sph">'+(i+1)+'</span>'}
    </div>`;
  }).join('');
}

function clickSlot(side,i){S.sides[side].activeSlot=S.sides[side].activeSlot===i?null:i;renderItemSlots();}
function removeItem(side,i,e){e.stopPropagation();S.sides[side].items[i]=null;renderAll();}

// ── CHAMPION PANEL ──────────────────────────────────────────
function renderChampPanel(side){
  const sd=S.sides[side],s=computeStats(side),el=document.getElementById('cp-'+side);
  const name=sd.champ?sd.champ.name:'Mannequin';
  const encoded=name!=='Mannequin'&&!!CHAMP_SPELLS[name];
  const color=side==='left'?'var(--blue)':'var(--orange)';
  const portraitHtml=sd.champ?`<img src="${sd.champ.loadingImg}" onerror="this.src='${sd.champ.img}'"/>`
    :dummySVG(side);
  const stats=[['HP',Math.round(s.hp)],['AD',Math.round(s.ad)],['AP',Math.round(s.ap)],['Armure',Math.round(s.armor)],['RM',Math.round(s.mr)],['AS',s.as.toFixed(2)],['Crit',Math.round(s.crit||0)+'%'],['MS',Math.round(s.ms)]];
  el.innerHTML=`
    <div class="champ-portrait" onclick="openModal('${side}')">${portraitHtml}</div>
    <div class="champ-info">
      <div class="champ-name" style="color:${color}">${name}</div>
      ${encoded?`<div class="encoded-badge">✓ Encodé</div>`:name!=='Mannequin'?`<div class="encoded-badge" style="border-color:var(--txt2);color:var(--txt2)">Pas de formules</div>`:''}
      <div class="champ-change" onclick="openModal('${side}')">Changer →</div>
      <div class="level-row">
        <span class="level-lbl">Niv</span>
        <input type="range" class="level-slider" min="1" max="18" value="${sd.level}" oninput="setLevel('${side}',this.value)"/>
        <span id="lv-${side}" class="level-val">${sd.level}</span>
      </div>
      <div class="stats-mini">${stats.map(([k,v])=>`<div class="sm-row"><span class="sm-key">${k}</span><span class="sm-val">${v}</span></div>`).join('')}</div>
    </div>`;
}

// ── RUNE PANEL (Forge de Build style) ──────────────────────
function mkRune(rune,on,kind,onClick){
  const b=document.createElement('button');b.className='rbtn'+(on?(kind==='sec'?' rs':' rp'):'');b.title=rune.n;
  b.innerHTML=`<img src="${rune.img}" onerror="this.style.opacity=.2" alt=""><span class="rn">${rune.n}</span>`;b.onclick=onClick;return b;
}

function renderRunePanel(side){
  const sd=S.sides[side];
  const el=document.getElementById('rp-'+side);
  const t=TREES[sd.priTree];
  const secT=TREES[sd.secTree];
  const color=side==='left'?'var(--blue)':'var(--orange)';
  el.innerHTML='';

  // Title
  const title=document.createElement('div');title.className='rp-title';title.style.color=color;
  title.textContent=side==='left'?'⚔ Mon champion — '+t.label:'🛡 Ennemi — '+t.label;el.appendChild(title);

  // PRIMARY TREE
  const priWrap=document.createElement('div');priWrap.className='rune-tree';el.appendChild(priWrap);
  const priHd=document.createElement('div');priHd.className='tree-hd';priHd.innerHTML=`<img src="${t.icon}" onerror="this.style.display='none'"> ${t.label}`;priWrap.appendChild(priHd);

  // Tree tabs (primary)
  const priTabs=document.createElement('div');priTabs.className='tree-tabs';
  TREE_KEYS.forEach(k=>{const tt=document.createElement('button');tt.className='ttab'+(sd.priTree===k?' op':'');tt.title=TREES[k].label;tt.innerHTML=`<img src="${TREES[k].icon}" onerror="this.style.display='none'">`;tt.onclick=()=>{if(sd.priTree===k)return;sd.priTree=k;sd.keystone=null;sd.pri=[null,null,null];if(sd.secTree===k){sd.secTree=TREE_KEYS.find(x=>x!==k);sd.sec=[null,null];}renderRunePanel(side);renderChampPanel(side);renderSpells(side);};priTabs.appendChild(tt);});
  priWrap.appendChild(priTabs);

  // Keystones
  const ksL=document.createElement('div');ksL.className='rlbl';ksL.textContent='Keystone';priWrap.appendChild(ksL);
  const kg=document.createElement('div');kg.className='kgrid';
  t.keystones.forEach(ks=>{kg.appendChild(mkRune(ks,sd.keystone===ks.id,'pri',()=>{sd.keystone=sd.keystone===ks.id?null:ks.id;renderRunePanel(side);renderChampPanel(side);renderSpells(side);}));});priWrap.appendChild(kg);

  // Primary rows
  t.rows.forEach((row,i)=>{const l=document.createElement('div');l.className='rlbl';l.textContent='Row '+(i+1);priWrap.appendChild(l);const rg=document.createElement('div');rg.className='rgrid';row.forEach(r=>{rg.appendChild(mkRune(r,sd.pri[i]===r.id,'pri',()=>{sd.pri[i]=sd.pri[i]===r.id?null:r.id;renderRunePanel(side);renderChampPanel(side);}));});priWrap.appendChild(rg);});

  // SECONDARY TREE
  const secWrap=document.createElement('div');secWrap.className='rune-tree sec';el.appendChild(secWrap);
  const secHd=document.createElement('div');secHd.className='tree-hd s';secHd.innerHTML=`<img src="${secT.icon}" onerror="this.style.display='none'"> ${secT.label}`;secWrap.appendChild(secHd);

  const secTabs=document.createElement('div');secTabs.className='tree-tabs';
  TREE_KEYS.forEach(k=>{const dis=(k===sd.priTree);const tt=document.createElement('button');tt.className='ttab'+(sd.secTree===k?' os':'')+(dis?' dis':'');tt.title=TREES[k].label;tt.innerHTML=`<img src="${TREES[k].icon}" onerror="this.style.display='none'">`;if(!dis)tt.onclick=()=>{if(sd.secTree===k)return;sd.secTree=k;sd.sec=[null,null];renderRunePanel(side);renderChampPanel(side);};secTabs.appendChild(tt);});secWrap.appendChild(secTabs);

  const secL=document.createElement('div');secL.className='rlbl';secL.textContent='Choisir 2 (max 1 par rang)';secWrap.appendChild(secL);
  secT.rows.forEach(row=>{const rg=document.createElement('div');rg.className='rgrid';row.forEach(r=>{const on=sd.sec.includes(r.id);const otherRow=row.some(x=>x.id!==r.id&&sd.sec.includes(x.id));const full=sd.sec.filter(Boolean).length>=2;const b=mkRune(r,on,'sec',()=>{if(on){sd.sec=sd.sec.map(x=>x===r.id?null:x);}else{const e=sd.sec.indexOf(null);if(e>=0)sd.sec[e]=r.id;}renderRunePanel(side);renderChampPanel(side);});if(!on&&(otherRow||full))b.classList.add('locked');rg.appendChild(b);});secWrap.appendChild(rg);});

  // Shards
  const shardsWrap=document.createElement('div');shardsWrap.className='shards-wrap';el.appendChild(shardsWrap);
  const shLbl=document.createElement('div');shLbl.className='rlbl';shLbl.textContent='Fragments';shardsWrap.appendChild(shLbl);
  const labels=['Offensif','Flexible','Défensif'];
  SHARDS.forEach((opts,i)=>{const row=document.createElement('div');row.className='shard-row-r';row.innerHTML=`<span class="shard-lbl">${labels[i]}</span>`;const wrap=document.createElement('div');wrap.className='shard-opts';opts.forEach(sh=>{const b=document.createElement('button');b.className='sbtn'+(sd.shards[i]===sh.id?' on':'');b.innerHTML=`<img src="${sh.img}" onerror="this.style.display='none'"> ${sh.n}`;b.onclick=()=>{sd.shards[i]=sh.id;renderRunePanel(side);renderChampPanel(side);};wrap.appendChild(b);});row.appendChild(wrap);shardsWrap.appendChild(row);});
}

// ── SPELLS ──────────────────────────────────────────────────
function renderSpells(side){
  const sd=S.sides[side],s=computeStats(side),t=computeStats(side==='left'?'right':'left');
  const el=document.getElementById('sc-'+side);
  const name=sd.champ?.name;
  const encoded=name&&CHAMP_SPELLS[name];
  if(!name&&!sd.champ){el.innerHTML=`<div style="color:var(--txt2);font-size:12px">Sélectionne un champion</div>`;return;}
  const ddSpells=sd.champ?.spells||[];
  const ddPassive=sd.champ?.passive;
  const spellKeys=['passive','Q','W','E','R'];
  el.innerHTML=spellKeys.map((key,ki)=>{
    const isP=key==='passive',rank=isP?1:(sd.ranks[key]||1),maxRank=key==='R'?3:isP?1:5;
    const ddSpell=isP?null:ddSpells[ki-1];
    let imgSrc=isP&&ddPassive?DDR+'img/passive/'+ddPassive.image.full:ddSpell?DDR+'img/spell/'+ddSpell.image.full:'';
    const spellName=encoded?.[key]?.name||(isP?ddPassive?.name:ddSpell?.name)||key;
    let cdStr='',costStr='';
    if(!isP&&encoded?.[key]?.cd){const cd=encoded[key].cd;cdStr=cd[rank-1]+'s';}
    else if(!isP&&ddSpell?.cooldown){const cds=ddSpell.cooldown;cdStr=(cds[Math.min(rank-1,cds.length-1)]||0)+'s';}
    if(!isP&&encoded?.[key]?.cost){const c=encoded[key].cost;costStr=c[rank-1]>0?c[rank-1]+' mana':'Gratuit';}
    else if(!isP&&ddSpell?.cost){const c=ddSpell.cost;const v=c[Math.min(rank-1,c.length-1)]||0;costStr=v>0?v+' mana':'Gratuit';}
    let desc=(isP?ddPassive?.description:ddSpell?.description)||'';
    desc=desc.replace(/<[^>]+>/g,'').replace(/\{\{[^}]+\}\}/g,'?');
    if(desc.length>80)desc=desc.slice(0,77)+'…';
    let dmgHtml='';
    if(encoded?.[key]){
      const res=encoded[key].fn(s,t,rank);
      let mit=res.dmg;
      if(res.dmg>0){
        if(res.type==='phys')mit=mitigPhys(res.dmg,t.armor,s.leth||0,s.apen||0);
        else if(res.type==='magic')mit=mitigMag(res.dmg,t.mr,s.mrpen_pct||0);
      }
      const c=res.type==='phys'?'var(--gold)':res.type==='magic'?'#8B9EFF':'var(--bright)';
      const lbl=res.type==='phys'?'⚔':res.type==='magic'?'✨':'◆';
      if(res.dmg>0)dmgHtml=`<div style="font-size:12px;font-weight:700;color:${c}">${lbl} ${mit}</div><div style="font-size:9px;color:var(--txt2)">brut: ${res.dmg}</div>`;
      else dmgHtml=`<div style="font-size:9px;color:var(--txt2);font-style:italic">${res.note||'Utilitaire'}</div>`;
      if(res.note&&res.dmg>0)dmgHtml+=`<div class="sc-note">${res.note}</div>`;
    } else if(name&&!encoded){dmgHtml=`<div style="font-size:9px;color:var(--txt2);font-style:italic">Champion non encodé</div>`;}
    const pips=!isP?`<div class="rank-pips">${Array.from({length:maxRank},(_,j)=>`<div class="rp-pip ${j<rank?'active':''}" onclick="setRank('${side}','${key}',${j+1})"></div>`).join('')}</div>`:'';
    return `<div class="spell-card">
      <div class="sc-top">
        <div class="sc-icon">${imgSrc?`<img src="${imgSrc}" onerror="this.style.background='var(--border)'"/>`:`<span style="font-family:'Cinzel',serif;font-size:10px;color:var(--txt2)">${key}</span>`}</div>
        <div><div class="sc-key k-${key}">${key}</div>${pips}</div>
      </div>
      <div class="sc-name" title="${spellName}">${spellName}</div>
      ${cdStr?`<div class="sc-cd">⏱ <b>${cdStr}</b>${costStr?' · '+costStr:''}</div>`:''}
      <div class="sc-desc">${desc}</div>
      ${dmgHtml}
    </div>`;
  }).join('');
}

// ── CHAMPION GRID ────────────────────────────────────────────
function renderChampGrid(arr){
  document.getElementById('champ-grid').innerHTML=arr.map(c=>`<div class="champ-tile" onclick="selectChamp('${c.id}')"><img src="${c.loadingImg||c.img}" onerror="this.src='${c.img}'"/><span>${c.name}</span></div>`).join('');
}

// ── TRAINING DUMMY ───────────────────────────────────────────
function dummySVG(side){const c=side==='left'?'#4ADE80':'#E06B4A';const f=side==='left'?'#2a4a2a':'#4a2a2a';return `<svg viewBox="0 0 100 130" fill="none" style="width:100%;height:100%"><circle cx="50" cy="22" r="18" fill="${f}" stroke="${c}" stroke-width="1.5"/><text x="50" y="28" text-anchor="middle" fill="${c}" font-size="18">?</text><rect x="28" y="42" width="44" height="48" rx="6" fill="${f}" stroke="${c}" stroke-width="1.5"/><rect x="10" y="44" width="18" height="8" rx="4" fill="${f}" stroke="${c}" stroke-width="1"/><rect x="72" y="44" width="18" height="8" rx="4" fill="${f}" stroke="${c}" stroke-width="1"/><rect x="34" y="90" width="12" height="36" rx="5" fill="${f}" stroke="${c}" stroke-width="1"/><rect x="54" y="90" width="12" height="36" rx="5" fill="${f}" stroke="${c}" stroke-width="1"/><rect x="46" y="52" width="8" height="28" fill="${c}" opacity=".25"/><rect x="36" y="62" width="28" height="8" fill="${c}" opacity=".25"/></svg>`;}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function setConfigSide(side){
  S.configSide=side;
  document.querySelectorAll('.side-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('.'+side+'-tab').classList.add('active');
  renderItemSlots();renderShop();
}
function setLevel(side,v){S.sides[side].level=parseInt(v);document.getElementById('lv-'+side).textContent=v;renderChampPanel(side);renderSpells(side);}
function setRank(side,spell,rank){S.sides[side].ranks[spell]=rank;renderSpells(side);}

function openModal(side){
  S.modalSide=side;
  document.getElementById('modal-title').textContent=side==='left'?'Choisir mon champion':"Choisir l'ennemi";
  document.getElementById('champ-modal').classList.add('open');
  document.getElementById('modal-input').value='';
  renderChampGrid(S.champArr);
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}
function closeModal(){document.getElementById('champ-modal').classList.remove('open');}
function filterModal(){const q=document.getElementById('modal-input').value.toLowerCase();renderChampGrid(q?S.champArr.filter(c=>c.name.toLowerCase().includes(q)):S.champArr);}

function selectChamp(id){
  const side=S.modalSide,champ=S.allChamps[id];
  S.sides[side].champ=champ;
  const def=DEF_RUNES[champ.name];
  if(def){const sd=S.sides[side];sd.priTree=def.pri;sd.keystone=def.ks;sd.pri=[...def.p];sd.secTree=def.sec;sd.sec=[...def.s];if(def.sh)sd.shards=[...def.sh];}
  closeModal();renderAll();
}
function selectDummy(){S.sides[S.modalSide].champ=null;closeModal();renderAll();}

document.getElementById('champ-modal').addEventListener('click',e=>{if(e.target===document.getElementById('champ-modal'))closeModal();});
async function logout(){await fetch('/api/auth/logout',{method:'POST',credentials:'include'});window.location.href='/login.html';}

(async()=>{
  await loadChamps();
  renderAll();
  await loadItems();
})();
