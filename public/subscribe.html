<div id="paypal-button-container">
  <div class="loading-paypal">Chargement PayPal…</div>
</div>

<script>
  var PAYPAL_CLIENT_ID = 'AQdM0aQGlC_v0QMPS4uig07LikY7GK8gGKc9Fr2oJBs-KKk-sGKYr2U52OUXhZTADZ7ApbTyIdyhxqSM'; // ← ton client ID sandbox
  var PAYPAL_PLAN_ID   = 'P-4DM91517V7675380RNIMBEPI';

  // Charge le SDK PayPal dynamiquement
  var script = document.createElement('script');
  script.src = 'https://www.paypal.com/sdk/js?client-id=' + PAYPAL_CLIENT_ID + '&vault=true&intent=subscription&currency=EUR';
  script.onload = function() { initPayPal(); };
  script.onerror = function() {
    document.getElementById('paypal-button-container').innerHTML =
      '<div class="loading-paypal" style="color:#f08080">Impossible de charger PayPal.<br>Vérifie ton Client ID.</div>';
  };
  document.head.appendChild(script);
</script>

<script>
function initPayPal() {
  document.getElementById('paypal-button-container').innerHTML = '';
  paypal.Buttons({
    style: { shape:'rect', color:'gold', layout:'vertical', label:'subscribe' },
    createSubscription: function(data, actions) {
      return actions.subscription.create({ plan_id: PAYPAL_PLAN_ID });
    },
    onApprove: async function(data) {
      const errEl     = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      errEl.classList.remove('show');
      try {
        const res = await fetch('/api/paypal/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ subscriptionId: data.subscriptionID }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Erreur activation');
        successEl.classList.add('show');
        setTimeout(() => { window.location.href = result.redirect || '/guide'; }, 1500);
      } catch(e) {
        errEl.textContent = 'Erreur : ' + e.message;
        errEl.classList.add('show');
      }
    },
    onError: function(err) {
      document.getElementById('errorMsg').textContent = 'Erreur PayPal. Réessaie.';
      document.getElementById('errorMsg').classList.add('show');
      console.error(err);
    },
  }).render('#paypal-button-container');
}
</script>
