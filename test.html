<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Urgot Calculator — Season 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#071009;--bg2:#0F1D12;--card:#132417;--border:#24422B;--green:#4ADE80;--green2:#22C55E;--text:#D6F5D3;--text2:#6B8F71;--gold:#D7B56D;--red:#C84B4B;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;padding:24px;}
h1{font-family:'Cinzel',serif;font-size:36px;margin-bottom:24px;}
.card{background:var(--bg2);border:1px solid var(--border);padding:20px;border-radius:10px;margin-bottom:20px;}
.title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green2);margin-bottom:18px;}
.slider-wrap{display:flex;gap:16px;align-items:center;}
#levelText{font-size:30px;font-weight:700;min-width:130px;}
input[type=range]{width:100%;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.stat{background:var(--card);border:1px solid #1F3624;padding:14px;border-radius:8px;}
.stat-name{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;}
.stat-bonus{font-size:13px;color:var(--green2);margin-top:2px;}
/* SLOTS */
.slots{display:grid;grid-template-columns:repeat(6,70px);gap:10px;}
.slot{width:70px;height:70px;background:#111;border:2px dashed var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.slot img{width:100%;height:100%;object-fit:cover;}
.slot-n{font-size:13px;color:var(--text2);}
.remove{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:3px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;cursor:pointer;}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100;}
.modal.open{display:flex;}
.modal-box{width:min(1300px,96vw);height:90vh;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
.modal-top{padding:14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.msearch{flex:1;min-width:180px;padding:10px;background:#111;border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;}
.mclose{padding:10px 16px;background:#111;border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:6px;font-family:'Rajdhani',sans-serif;}
.mcats{display:flex;gap:6px;flex-wrap:wrap;}
.mcat{padding:5px 12px;background:#111;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:4px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
.mcat.on{border-color:var(--green);color:var(--green);}
.items-grid{padding:16px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;flex:1;}
.item{background:var(--card);border:1px solid #203626;padding:8px;border-radius:6px;cursor:pointer;text-align:center;transition:.2s;}
.item:hover{border-color:var(--green);transform:translateY(-2px);}
.item img{width:52px;height:52px;margin-bottom:5px;}
.item span{font-size:10px;display:block;line-height:1.3;}
/* RUNES */
.runes-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:700px){.runes-layout{grid-template-columns:1fr;}}
.rune-col{background:var(--card);border:1px solid #203626;border-radius:10px;padding:16px;}
.rune-col-header{font-family:'Cinzel',serif;font-size:13px;text-align:center;margin-bottom:16px;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px;}
.rune-col-header img{width:24px;height:24px;border-radius:4px;}
.tree-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tree-tab{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#0a1510;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:6px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:.08em;transition:.15s;}
.tree-tab img{width:18px;height:18px;border-radius:3px;}
.tree-tab:hover{border-color:var(--green2);color:var(--text);}
.tree-tab.on{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.07);}
.tree-tab.sec.on{border-color:#0BC4E3;color:#0BC4E3;background:rgba(11,196,227,.06);}
.section-lbl{font-size:9px;font-family:'Cinzel',serif;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);margin:.7rem 0 .3rem;}
.keystone-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.rune-row-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.rune-btn{position:relative;overflow:hidden;border:1px solid #27422D;padding:8px 6px 8px;border-radius:7px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif;text-align:center;transition:.15s;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;background:#0d1a10;letter-spacing:.05em;line-height:1.2;}
.rune-btn img{width:36px;height:36px;border-radius:4px;flex-shrink:0;}
.keystone-grid .rune-btn{min-height:80px;}
.keystone-grid .rune-btn img{width:44px;height:44px;}
.rune-btn span{position:relative;z-index:2;}
.rune-btn:hover{border-color:var(--green2);transform:translateY(-1px);}
.rune-btn.on{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.3),inset 0 0 10px rgba(74,222,128,.12);}
.rune-btn.sec.on{border-color:#0BC4E3;box-shadow:0 0 12px rgba(11,196,227,.25);}
/* SHARDS */
.shards-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px;}
.shard-slot{display:flex;flex-direction:column;gap:4px;}
.shard-btn{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#0a1510;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:5px;font-size:11px;transition:.15s;}
.shard-btn img{width:18px;height:18px;border-radius:3px;}
.shard-btn:hover{border-color:var(--green2);}
.shard-btn.on{border-color:var(--green);color:var(--green);}
/* SPELLS */
.passive{margin-top:20px;padding:16px;background:var(--card);border:1px solid #203626;border-radius:8px;}
.passive-title{font-family:'Cinzel',serif;font-size:14px;margin-bottom:14px;color:var(--green);}
.spell-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.spell-card{background:#101913;border:1px solid #27422D;padding:12px;border-radius:8px;}
.spell-name{font-family:'Cinzel',serif;font-size:12px;margin-bottom:6px;color:var(--gold);}
.spell-cd{font-size:26px;font-weight:700;color:var(--green);margin-bottom:4px;}
.spell-scaling{font-size:11px;color:var(--text2);}
/* PASSIVE BOX */
.leg-box{margin-top:14px;padding:14px;background:#101913;border:1px solid #27422D;border-radius:8px;}
.leg-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--green);margin-bottom:10px;text-transform:uppercase;}
.leg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;}
.leg-stat{font-size:12px;color:var(--text);}
.leg-stat strong{color:var(--green2);}
</style>
</head>
<body>

<h1>Urgot Advanced Calculator</h1>

<div class="card">
  <div class="title">Champion Level</div>
  <div class="slider-wrap">
    <div id="levelText">Level 9</div>
    <input type="range" min="1" max="20" value="9" id="levelSlider"/>
  </div>
</div>

<div class="card">
  <div class="title">Items — 6 slots (ranked items only)</div>
  <div class="slots" id="slots"></div>
</div>

<div class="card">
  <div class="title">Runes</div>
  <div class="runes-layout">
    <div class="rune-col" id="col-primary">
      <div class="rune-col-header" id="primary-header">PRIMARY TREE</div>
      <div class="section-lbl">Choose primary tree</div>
      <div class="tree-tabs" id="primary-tabs"></div>
      <div id="primary-runes"></div>
    </div>
    <div class="rune-col" id="col-secondary">
      <div class="rune-col-header" id="secondary-header">SECONDARY TREE</div>
      <div class="section-lbl">Choose secondary tree</div>
      <div class="tree-tabs" id="secondary-tabs"></div>
      <div id="secondary-runes"></div>
    </div>
  </div>
  <div style="margin-top:14px;">
    <div class="section-lbl">Fragments (3 slots)</div>
    <div class="shards-wrap" id="shards-wrap"></div>
  </div>
</div>

<div class="card">
  <div class="title">Stats</div>
  <div class="grid" id="stats"></div>
  <div class="passive" id="spellCooldowns"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-top">
      <input class="msearch" id="searchInput" placeholder="Search item…"/>
      <div class="mcats" id="mcats"></div>
      <button class="mclose" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="items-grid" id="itemsContainer"></div>
  </div>
</div>

  hp:{base:585,growth:88},

  armor:{base:36,growth:4.25},
  mr:{base:32,growth:1.25},
  asBase:0.625, asGrowth:3.75,
  ms:330
};

function grow(b,g,lvl){
  if(lvl<=1) return b;
  const n=lvl-1;
  return b + g*(0.7025*n + 0.0175*n*n);
}
function growAS(b,gPct,lvl){
  return Math.min(b*(1+(gPct/100)*(lvl-1)),2.5);
}
function shardHP(lvl){ return Math.round(10+(190/17)*Math.min(lvl-1,17)); }

let ALL_ITEMS=[];
let activeCat='All';

async function loadItems(){
  try{
    const res=await fetch(`https://ddragon.leagueoflegends.com/cdn/${PATCH}/data/en_US/item.json`);
    const data=await res.json();
    ALL_ITEMS=Object.entries(data.data)
      .filter(([id])=>RANKED_IDS.includes(Number(id)))
      .map(([id,item])=>({
        id:Number(id),
        name:item.name,
        cat:ITEM_CATS[Number(id)]||'Other',
        img:DDI(id),
        hp:item.stats.FlatHPPoolMod||0,
        ad:item.stats.FlatPhysicalDamageMod||0,
        armor:item.stats.FlatArmorMod||0,
        mr:item.stats.FlatSpellBlockMod||0,
        ah:item.stats.FlatHasteMod||0,
        as:item.stats.PercentAttackSpeedMod||0,
        crit:(item.stats.FlatCritChanceMod||0)*100,
        ls:(item.stats.PercentLifeStealMod||0)*100,
        ms:item.stats.FlatMovementSpeedMod||0,
        ms_pct:item.stats.PercentMovementSpeedMod||0,
        leth:item.stats.FlatMagicPenetrationMod||0, // API uses wrong key for leth sometimes
        special:SPECIALS[Number(id)]||null,
      }));
    // Fix lethality (DDragon doesn't always expose it correctly — use known values)
    const lethMap={3814:20,6695:18,6692:20,3142:18,6701:20,3033:0,3036:0};
    ALL_ITEMS.forEach(it=>{if(lethMap[it.id]!==undefined)it.leth=lethMap[it.id];});
    const apenMap={3033:30,3036:35};
    ALL_ITEMS.forEach(it=>{it.apen=apenMap[it.id]||0;});
    const omniMap={223008:8,1055:3};
    ALL_ITEMS.forEach(it=>{it.omni=omniMap[it.id]||0;});
    renderItems();
  }catch(e){console.error('Item load failed',e);}
}

const STATE={
  level:9,
  items:[null,null,null,null,null,null],
  primaryTree:'precision',
  secondaryTree:'resolve',
  keystone:'pta',
  pri:[null,null,null],
  sec:[null,null],
  sh:['sh1_ad','sh2_hp','sh3_65'],

};

// ─── SLOTS ───
function renderSlots(){
  const root=document.getElementById('slots'); root.innerHTML='';
  STATE.items.forEach((item,idx)=>{
    const d=document.createElement('div'); d.className='slot';
    if(item){
      d.innerHTML=`<img src="${item.img}" title="${item.name}"><div class="remove">✕</div>`;
      d.querySelector('.remove').onclick=e=>{e.stopPropagation();STATE.items[idx]=null;renderSlots();calc();};
    } else d.innerHTML=`<span class="slot-n">${idx+1}</span>`;
    d.onclick=()=>openModal(idx);
    root.appendChild(d);
  });
}

function openModal(idx){
  STATE.activeSlot=idx;
  document.getElementById('modal').classList.add('open');
  document.getElementById('searchInput').value='';
  renderMCats();renderItems();
  setTimeout(()=>document.getElementById('searchInput').focus(),40);
}
function closeModal(){document.getElementById('modal').classList.remove('open');STATE.activeSlot=null;}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeModal();};

const CAT_LIST=['All','Fighter','Tank','Boots','Marksman','Mage','Assassin','Support','Starter','Component'];
function renderMCats(){
  const c=document.getElementById('mcats'); c.innerHTML='';
  CAT_LIST.forEach(cat=>{
    const b=document.createElement('button'); b.className='mcat'+(activeCat===cat?' on':'');
    b.textContent=cat;
    b.onclick=()=>{activeCat=cat;renderMCats();renderItems();};
    c.appendChild(b);
  });
}
function renderItems(){
  const root=document.getElementById('itemsContainer'); root.innerHTML='';
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=ALL_ITEMS.filter(it=>(activeCat==='All'||it.cat===activeCat)&&(!q||it.name.toLowerCase().includes(q)));
  if(!list.length){root.innerHTML='<div style="color:var(--text2);padding:1rem;grid-column:1/-1">No items found</div>';return;}
  list.forEach(item=>{
    const d=document.createElement('div'); d.className='item';
    d.innerHTML=`<img src="${item.img}"><span>${item.name}</span>`;
    d.onclick=()=>{if(STATE.activeSlot!==null){STATE.items[STATE.activeSlot]=item;closeModal();renderSlots();calc();}};
    root.appendChild(d);
  });
}
document.getElementById('searchInput').addEventListener('input',renderItems);

// ─── RUNES ───
function findRune(id){
  for(const tk of TREE_KEYS){
    const t=TREES[tk];
    for(const k of t.keystones) if(k.id===id) return k;
    for(const row of t.rows) for(const r of row) if(r.id===id) return r;
  }
  for(const slot of SHARDS) for(const r of slot) if(r.id===id) return r;
  return null;
}

function runeBtn(rune, stateKey, idx, isSec){
  const b=document.createElement('button');
  const isOn = Array.isArray(STATE[stateKey])
    ? (idx!==undefined ? STATE[stateKey][idx]===rune.id : STATE[stateKey].includes(rune.id))
    : STATE[stateKey]===rune.id;
  b.className='rune-btn'+(isOn?' on':'')+(isSec&&isOn?' sec':'');
  b.title=rune.label+(rune.effect?'\n'+rune.effect:'');
  b.innerHTML=`<img src="${rune.img}" onerror="this.style.display='none'"/><span>${rune.label}</span>`;
  b.onclick=()=>{
    if(Array.isArray(STATE[stateKey])&&idx!==undefined){
      STATE[stateKey][idx]=(STATE[stateKey][idx]===rune.id?null:rune.id);
    } else {
      STATE[stateKey]=(STATE[stateKey]===rune.id?null:rune.id);
    }
    renderRunes();calc();
  };
  return b;
}

function treeTabs(containerId, selectedTree, role){
  const c=document.getElementById(containerId); c.innerHTML='';
  TREE_KEYS.forEach(tk=>{
    if(role==='secondary'&&tk===STATE.primaryTree) return;
    const t=TREES[tk];
    const b=document.createElement('button');
    b.className='tree-tab'+(role==='secondary'?' sec':'')+(selectedTree===tk?' on':'');
    b.innerHTML=`<img src="${t.img}" onerror="this.style.display='none'"/>${t.label}`;
    b.onclick=()=>{
      if(role==='primary'){
        STATE.primaryTree=tk; STATE.keystone=null; STATE.pri=[null,null,null];
        if(STATE.secondaryTree===tk) STATE.secondaryTree=TREE_KEYS.find(k=>k!==tk);
        STATE.sec=[null,null];
      } else {
        STATE.secondaryTree=tk; STATE.sec=[null,null];
      }
      renderRunes();calc();
    };
    c.appendChild(b);
  });
}

function renderRunes(){
  const pt=TREES[STATE.primaryTree];
  const st=TREES[STATE.secondaryTree];

  treeTabs('primary-tabs', STATE.primaryTree,'primary');
  treeTabs('secondary-tabs',STATE.secondaryTree,'secondary');

  document.getElementById('primary-header').innerHTML=
    `<img src="${pt.img}" style="width:24px;height:24px;border-radius:4px;"/> PRIMARY — ${pt.label}`;
  document.getElementById('secondary-header').innerHTML=
    `<img src="${st.img}" style="width:24px;height:24px;border-radius:4px;"/> SECONDARY — ${st.label}`;

  // Primary
  const pp=document.getElementById('primary-runes'); pp.innerHTML='';
  const kGrid=document.createElement('div'); kGrid.className='keystone-grid';
  pt.keystones.forEach(k=>kGrid.appendChild(runeBtn(k,'keystone',undefined,false)));
  pp.appendChild(Object.assign(document.createElement('div'),{className:'section-lbl',textContent:'Keystone'}));
  pp.appendChild(kGrid);
  pt.rows.forEach((row,i)=>{
    pp.appendChild(Object.assign(document.createElement('div'),{className:'section-lbl',textContent:`Ligne ${i+1}`}));
    const rg=document.createElement('div'); rg.className='rune-row-grid';
    row.forEach(r=>rg.appendChild(runeBtn(r,'pri',i,false)));
    pp.appendChild(rg);
  });

  // Secondary
  const sp=document.getElementById('secondary-runes'); sp.innerHTML='';
  // Flatten all rows of secondary tree
  const allSecRunes=st.rows.flat();
  ['Ligne A','Ligne B'].forEach((lbl,i)=>{
    sp.appendChild(Object.assign(document.createElement('div'),{className:'section-lbl',textContent:lbl+' (choisir 1)'}));
    const rg=document.createElement('div'); rg.className='rune-row-grid';
    allSecRunes.forEach(r=>{
      const b=runeBtn(r,'sec',i,true);
      // Disable if already picked in other slot
      const other=STATE.sec[1-i];
      if(other===r.id){b.style.opacity='.3';b.style.pointerEvents='none';}
      rg.appendChild(b);
    });
    sp.appendChild(rg);
  });

  // Shards
  renderShards();
}

function renderShards(){
  const c=document.getElementById('shards-wrap'); c.innerHTML='';
  SHARDS.forEach((opts,i)=>{
    const col=document.createElement('div'); col.className='shard-slot';
    col.appendChild(Object.assign(document.createElement('div'),{className:'section-lbl',textContent:`Slot ${i+1}`}));
    opts.forEach(s=>{
      const b=document.createElement('button');
      b.className='shard-btn'+(STATE.sh[i]===s.id?' on':'');
      b.innerHTML=`<img src="${s.img}" onerror="this.style.display='none'"/>${s.label}`;
      b.onclick=()=>{STATE.sh[i]=s.id;renderShards();calc();};
      col.appendChild(b);
    });
    c.appendChild(col);
  });
}

// ─── ABILITY HASTE ───
function getAH(){
  let ah=0;
  STATE.items.forEach(it=>{if(it) ah+=it.ah||0;});
  const allRunes=[STATE.keystone,...STATE.pri,...STATE.sec,...STATE.sh];
  allRunes.forEach(id=>{
    const r=findRune(id); if(r&&r.stats&&r.stats.ah) ah+=r.stats.ah;
  });
  return ah;
}

function cdFormula(base,ah){return base*(100/(100+ah));}

// ─── SPELL RANKS (standard Urgot order: W max 9, Q after, E last) ───
function spellRanks(lvl){
  // Q: 1 point at lvl 1, then maxed after W
  // W: maxed at lvl 9
  // E: 1 point at lvl 2
  // R: 6,11,16
  const r=lvl>=16?3:lvl>=11?2:1;
  const w=Math.min(5,lvl>=9?5:Math.max(1,lvl-Math.min(lvl,1)));
  const e=1;
  const q=Math.max(1,Math.min(5,lvl-w-e-(r-1)-1+1));
  return {q:Math.min(5,Math.max(1,q)),w:Math.min(5,Math.max(1,w)),e:1,r};
}

function calcSpells(){
  const ah=getAH();
  const ranks=spellRanks(STATE.level);
  const qCD=cdFormula(SPELLS.Q.base[ranks.q-1],ah);
  const wCD=ranks.w===5?0:cdFormula(SPELLS.W.base[ranks.w-1],ah);
  const eCD=cdFormula(SPELLS.E.base[ranks.e-1],ah);
  const rCD=cdFormula(SPELLS.R.base[ranks.r-1],ah);

  document.getElementById('spellCooldowns').innerHTML=`
<div class="passive-title">Ability Cooldowns (AH: ${Math.round(ah)})</div>
<div class="spell-grid">
  <div class="spell-card"><div class="spell-name">Q — ${SPELLS.Q.name}</div><div class="spell-cd">${qCD.toFixed(2)}s</div><div class="spell-scaling">Base: ${SPELLS.Q.base[ranks.q-1]}s · Rang ${ranks.q}/5</div></div>
  <div class="spell-card"><div class="spell-name">W — ${SPELLS.W.name}</div><div class="spell-cd">${wCD===0?'Toggle':wCD.toFixed(2)+'s'}</div><div class="spell-scaling">Rang ${ranks.w}/5${ranks.w===5?' — Toggle infini':''}</div></div>
  <div class="spell-card"><div class="spell-name">E — ${SPELLS.E.name}</div><div class="spell-cd">${eCD.toFixed(2)}s</div><div class="spell-scaling">Base: ${SPELLS.E.base[ranks.e-1]}s · Rang ${ranks.e}/5</div></div>
  <div class="spell-card"><div class="spell-name">R — ${SPELLS.R.name}</div><div class="spell-cd">${rCD.toFixed(2)}s</div><div class="spell-scaling">Base: ${SPELLS.R.base[ranks.r-1]}s · Rang ${ranks.r}/3</div></div>
  <div class="spell-card"><div class="spell-name">Formule</div><div class="spell-cd" style="font-size:14px;line-height:1.5">CD × 100 / (100 + AH)</div><div class="spell-scaling">AH actuel: ${Math.round(ah)}</div></div>
</div>`;

  // Passive Echoing Flames
  const ADR=[.40,.40,.40,.40,.60,.60,.60,.60,.80,.80,.80,.80,1,.95,1,1,1,1.05,1.05,1.10];
  const HPR=[.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.04,.04,.04,.05,.06,.06,.06,.06];
  const LCDS=[30,28,26,22,18,15,12,10,8,6,4.5,3.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5];
  const lvl=STATE.level;
  const adR=ADR[lvl-1]||1.10, hpR=HPR[lvl-1]||.06, legCD=LCDS[lvl-1]||2.5;

  // Get total AD and HP from calc result (we call from calc so they're computed)
  return {adR,hpR,legCD};
}

// ─── MAIN CALC ───
function calc(){
  const lvl=STATE.level;

  // Base stats
  let hp    = grow(BASE.hp.base,   BASE.hp.growth,   lvl);
  let ad    = grow(BASE.ad.base,   BASE.ad.growth,   lvl);
  let armor = grow(BASE.armor.base,BASE.armor.growth,lvl);
  let mr    = grow(BASE.mr.base,   BASE.mr.growth,   lvl);
  let as    = growAS(BASE.asBase,  BASE.asGrowth,    lvl);
  let hp5   = grow(BASE.hpReg.base,BASE.hpReg.growth,lvl)*5;
  const bHP=hp, bAD=ad, bArmor=armor, bMR=mr;
  let ms=BASE.ms, crit=0, ls=0, ah=0, leth=0, apen=0, mrpen=0, omni=0, ten=0, ms_pct=0;

  // Rune stats
  const allRuneIds=[STATE.keystone,...STATE.pri,...STATE.sec,...STATE.sh];
  allRuneIds.forEach(id=>{
    if(!id) return;
    const r=findRune(id); if(!r||!r.stats) return;
    const s=r.stats;
    if(s.hp==='scaling') hp+=shardHP(lvl);
    else if(s.hp) hp+=s.hp;
    if(s.ad)      ad+=s.ad;
    if(s.armor)   armor+=s.armor;
    if(s.mr)      mr+=s.mr;
    if(s.as)      as=Math.min(as*(1+s.as),2.5);
    if(s.crit)    crit+=s.crit;
    if(s.ls)      ls+=s.ls;
    if(s.ah)      ah+=s.ah;
    if(s.leth)    leth+=s.leth;
    if(s.apen)    apen+=s.apen;
    if(s.mrpen)   mrpen+=s.mrpen;
    if(s.omni)    omni+=s.omni;
    if(s.tenacity)ten+=s.tenacity;
    if(s.ms_flat) ms+=s.ms_flat;
    if(s.ms_pct)  ms_pct+=s.ms_pct;
  });

  // Item stats
  let bonusHP_items=0;
  let hasBloodmail=false,hasJaksho=false,hasBC=false;
  STATE.items.forEach(it=>{
    if(!it) return;
    hp+=it.hp||0; bonusHP_items+=it.hp||0;
    ad+=it.ad||0; armor+=it.armor||0; mr+=it.mr||0;
    if(it.ah) ah+=it.ah;
    if(it.as) as=Math.min(as*(1+it.as),2.5);
    if(it.crit) crit+=it.crit;
    if(it.ls)   ls+=it.ls;
    if(it.leth) leth+=it.leth;
    if(it.apen) apen+=it.apen;
    if(it.mrpen)mrpen+=it.mrpen;
    if(it.omni) omni+=it.omni;
    if(it.ms)   ms+=it.ms;
    if(it.ms_pct)ms_pct+=it.ms_pct;
    if(it.special){
      if(it.special.bloodmail)hasBloodmail=true;
      if(it.special.jaksho)  hasJaksho=true;
      if(it.special.bc)      hasBC=true;
    }
  });

  const totalBonusHP=hp-bHP;
  // Bloodmail: +4% AD per 100 bonus HP
  let bloodmailAD=0;
  if(hasBloodmail) bloodmailAD=Math.floor(totalBonusHP/100)*0.04*(ad-bAD);
  ad+=bloodmailAD;
  // Jak'Sho at 6 stacks: +12% resists
  let jakArmor=0,jakMR=0;
  if(hasJaksho){jakArmor=armor*0.12; jakMR=mr*0.12; armor+=jakArmor; mr+=jakMR;}
  // MS pct
  if(ms_pct) ms=Math.floor(ms*(1+ms_pct));

  const ehpP=hp*(1+armor/100);
  const ehpM=hp*(1+mr/100);
  const bonusAD=ad-bAD;

  // Spell CDs
  const leg=calcSpells();
  const legAD=ad*leg.adR;
  const legHP=hp*leg.hpR;

  // Render stats
  const g=document.getElementById('stats');
  function s(ico,name,val,bonus){
    const bStr=bonus!==undefined&&bonus>0?`<div class="stat-bonus">+${Math.round(bonus)}</div>`:'';
    return `<div class="stat"><div class="stat-name">${ico} ${name}</div><div class="stat-value">${typeof val==='number'?Math.round(val*100)/100:val}</div>${bStr}</div>`;
  }
  g.innerHTML=
    s('❤️','Health',        hp,     hp-bHP)+
    s('⚔️','Attack Damage', ad,     bonusAD)+
    s('🛡','Armor',          armor,  armor-bArmor)+
    s('🔮','Magic Resist',  mr,     mr-bMR)+
    s('⚡','Attack Speed',  as.toFixed(3))+
    s('💨','Move Speed',    Math.round(ms))+
    s('🩹','HP Regen /5s',  hp5.toFixed(1))+
    s('🎯','Crit Chance',   crit+'%')+
    s('🩸','Life Steal',    ls+'%')+
    s('⏱','Ability Haste', Math.round(ah))+
    s('🔪','Lethality',     Math.round(leth))+
    s('📐','Armor Pen %',   apen+'%')+
    s('🌀','Magic Pen %',   mrpen+'%')+
    s('💊','Omnivamp',      omni+'%')+
    (ten?s('🧊','Tenacity %',ten+'%'):'')+
    s('🏋','EHP vs Phys',  Math.round(ehpP))+
    s('🔥','EHP vs Magic', Math.round(ehpM));

  // Passive leg info
  let notes='';
  if(hasBloodmail&&bloodmailAD>0.5) notes+=`<div class="leg-stat">Bloodmail bonus: <strong>+${Math.round(bloodmailAD)} AD</strong></div>`;
  if(hasJaksho)notes+=`<div class="leg-stat">Jak'Sho 6 stacks: <strong>+${Math.round(jakArmor)} armor / +${Math.round(jakMR)} MR</strong></div>`;
  if(hasBC)    notes+=`<div class="leg-stat">Black Cleaver: <strong>6×6% = 36% armor shred max</strong></div>`;

  const legBox=document.createElement('div'); legBox.className='leg-box';
  legBox.innerHTML=`<div class="leg-title">⚙ Echoing Flames — Niveau ${STATE.level}</div><div class="leg-grid">
    <div class="leg-stat">AD/leg: <strong>${Math.round(leg.adR*100)}% = ${Math.round(legAD)}</strong></div>
    <div class="leg-stat">HP%/leg: <strong>${Math.round(leg.hpR*100)}% = ${Math.round(legHP)}</strong></div>
    <div class="leg-stat">Burst 6 legs: <strong>${Math.round(legAD*6)} AD + ${Math.round(legHP*6)} HP</strong></div>
    <div class="leg-stat">CD/leg: <strong>${leg.legCD}s</strong></div>
    ${notes}</div>`;
  document.getElementById('spellCooldowns').appendChild(legBox);
}

document.getElementById('levelSlider').addEventListener('input',e=>{
  STATE.level=parseInt(e.target.value);
  document.getElementById('levelText').textContent=`Level ${STATE.level}`;
  calc();
});

renderSlots();
renderRunes();
calc();
