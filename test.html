<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Urgot Stats Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#08100A;
--card:#0E1A11;
--border:#204028;
--green:#4ADE80;
--green2:#22C55E;
--txt:#CFEBCB;
--txt2:#6D9671;
--red:#C84B4B;
}

body{
background:var(--bg);
color:var(--txt);
font-family:'Rajdhani',sans-serif;
padding:24px;
}

h1{
font-family:'Cinzel',serif;
margin-bottom:24px;
font-size:38px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:8px;
padding:18px;
margin-bottom:18px;
}

.title{
font-family:'Cinzel',serif;
font-size:12px;
letter-spacing:.18em;
color:var(--green2);
margin-bottom:16px;
text-transform:uppercase;
}

.slots{
display:grid;
grid-template-columns:repeat(6,70px);
gap:10px;
}

.slot{
width:70px;
height:70px;
border:2px dashed var(--border);
background:#111;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:6px;
overflow:hidden;
position:relative;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

.remove{
position:absolute;
top:2px;
right:2px;
width:16px;
height:16px;
border-radius:3px;
background:var(--red);
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
color:#fff;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

.stat{
background:#132017;
border:1px solid #1f3525;
padding:12px;
border-radius:6px;
}

.stat-name{
font-size:11px;
letter-spacing:.12em;
color:var(--txt2);
text-transform:uppercase;
margin-bottom:6px;
}

.stat-value{
font-size:24px;
font-weight:700;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.modal.open{
display:flex;
}

.modal-box{
width:min(900px,95vw);
max-height:85vh;
overflow:auto;
background:var(--card);
border:1px solid var(--border);
border-radius:8px;
padding:18px;
}

.item-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
gap:10px;
}

.item{
background:#122017;
border:1px solid #203426;
padding:8px;
border-radius:6px;
cursor:pointer;
text-align:center;
}

.item:hover{
border-color:var(--green);
}

.item img{
width:52px;
height:52px;
margin-bottom:6px;
}

.item span{
font-size:11px;
display:block;
}

.close{
margin-bottom:12px;
background:#17261A;
border:1px solid var(--border);
padding:8px 12px;
color:var(--txt);
cursor:pointer;
}

.runes{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.rune{
padding:8px 12px;
background:#122017;
border:1px solid #28402D;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.rune.active{
border-color:var(--green);
color:var(--green);
}

input[type=range]{
width:100%;
margin-top:12px;
}
</style>
</head>

<body>

<h1>Urgot Stats Calculator</h1>

<div class="card">
<div class="title">Champion Level</div>

<div style="font-size:28px" id="lvlText">Level 9</div>

<input type="range" min="1" max="18" value="9" id="lvl">
</div>

<div class="card">
<div class="title">Items</div>

<div class="slots" id="slots"></div>
</div>

<div class="card">
<div class="title">Runes</div>

<div class="runes" id="runes"></div>
</div>

<div class="card">
<div class="title">Stats</div>

<div class="stats" id="stats"></div>
</div>

<div class="modal" id="modal">
<div class="modal-box">

<button class="close" onclick="closeModal()">Fermer</button>

<div class="item-grid" id="itemGrid"></div>

</div>
</div>

<script>

const BASE = {
hp:{b:585,g:88},
ad:{b:55,g:4},
armor:{b:36,g:4.25},
mr:{b:32,g:1.25},
as:{b:0.625,g:0.0375},
ms:330
};

function grow(base,growth,lvl){
if(lvl===1) return base;
const n=lvl-1;
return base + growth*n*(0.7025+0.0175*n);
}

function growAS(base,growth,lvl){
return Math.min(
base*(1+growth*(lvl-1)),
2.5
);
}

const ITEMS = [

{
id:3071,
name:"Black Cleaver",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/3071.png",
hp:400,
ad:40,
armor:0,
mr:0
},

{
id:3053,
name:"Sterak's Gage",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/3053.png",
hp:400,
ad:0,
armor:0,
mr:0
},

{
id:6665,
name:"Jak'Sho",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/6665.png",
hp:350,
ad:0,
armor:45,
mr:45
},

{
id:3748,
name:"Titanic Hydra",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/3748.png",
hp:550,
ad:40,
armor:0,
mr:0
},

{
id:3047,
name:"Plated Steelcaps",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/3047.png",
hp:0,
ad:0,
armor:20,
mr:0,
boots:true
},

{
id:3111,
name:"Mercury's Treads",
img:"https://ddragon.leagueoflegends.com/cdn/15.24.1/img/item/3111.png",
hp:0,
ad:0,
armor:0,
mr:20,
boots:true
}

];

const RUNES = [

{
id:"conq",
name:"Conqueror",
ad:28
},

{
id:"grasp",
name:"Grasp",
hp:80
},

{
id:"aftershock",
name:"Aftershock",
armor:35,
mr:35
}

];

const STATE = {
lvl:9,
items:[null,null,null,null,null,null],
rune:"conq",
activeSlot:null
};

function renderSlots(){

const root=document.getElementById("slots");
root.innerHTML="";

STATE.items.forEach((item,index)=>{

const div=document.createElement("div");
div.className="slot";

if(item){

div.innerHTML=`
<img src="${item.img}">
<div class="remove">✕</div>
`;

div.querySelector(".remove").onclick=(e)=>{
e.stopPropagation();
STATE.items[index]=null;
renderSlots();
calc();
};

}else{

div.innerHTML=`<span>${index+1}</span>`;

}

div.onclick=()=>{
openModal(index);
};

root.appendChild(div);

});

}

function openModal(index){

STATE.activeSlot=index;

document.getElementById("modal").classList.add("open");

renderItems();

}

function closeModal(){
document.getElementById("modal").classList.remove("open");
}

function hasBoots(){

return STATE.items.some(i=>i && i.boots);

}

function renderItems(){

const root=document.getElementById("itemGrid");
root.innerHTML="";

ITEMS.forEach(item=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${item.img}">
<span>${item.name}</span>
`;

div.onclick=()=>{

if(item.boots && hasBoots()){

alert("Vous avez déjà des bottes.");
return;

}

STATE.items[STATE.activeSlot]=item;

closeModal();

renderSlots();

calc();

};

root.appendChild(div);

});

}

function renderRunes(){

const root=document.getElementById("runes");
root.innerHTML="";

RUNES.forEach(r=>{

const div=document.createElement("div");

div.className="rune";

if(STATE.rune===r.id){
div.classList.add("active");
}

div.textContent=r.name;

div.onclick=()=>{

STATE.rune=r.id;

renderRunes();

calc();

};

root.appendChild(div);

});

}

function getRune(){

return RUNES.find(r=>r.id===STATE.rune);

}

function calc(){

const lvl=STATE.lvl;

const rune=getRune();

let hpBonus=0;
let adBonus=0;
let armorBonus=0;
let mrBonus=0;

STATE.items.forEach(item=>{

if(!item) return;

hpBonus += item.hp || 0;
adBonus += item.ad || 0;
armorBonus += item.armor || 0;
mrBonus += item.mr || 0;

});

hpBonus += rune.hp || 0;
adBonus += rune.ad || 0;
armorBonus += rune.armor || 0;
mrBonus += rune.mr || 0;

const hp = Math.round(
grow(BASE.hp.b,BASE.hp.g,lvl)
+ hpBonus
);

const ad = Math.round(
grow(BASE.ad.b,BASE.ad.g,lvl)
+ adBonus
);

const armor = Math.round(
grow(BASE.armor.b,BASE.armor.g,lvl)
+ armorBonus
);

const mr = Math.round(
grow(BASE.mr.b,BASE.mr.g,lvl)
+ mrBonus
);

const atkSpeed = growAS(
BASE.as.b,
BASE.as.g,
lvl
).toFixed(3);

const ehpPhys = Math.round(
hp * (1 + armor/100)
);

const ehpMagic = Math.round(
hp * (1 + mr/100)
);

const stats=document.getElementById("stats");

stats.innerHTML=`

<div class="stat">
<div class="stat-name">Health</div>
<div class="stat-value">${hp}</div>
</div>

<div class="stat">
<div class="stat-name">Attack Damage</div>
<div class="stat-value">${ad}</div>
</div>

<div class="stat">
<div class="stat-name">Armor</div>
<div class="stat-value">${armor}</div>
</div>

<div class="stat">
<div class="stat-name">Magic Resist</div>
<div class="stat-value">${mr}</div>
</div>

<div class="stat">
<div class="stat-name">Attack Speed</div>
<div class="stat-value">${atkSpeed}</div>
</div>

<div class="stat">
<div class="stat-name">Move Speed</div>
<div class="stat-value">${BASE.ms}</div>
</div>

<div class="stat">
<div class="stat-name">EHP Physical</div>
<div class="stat-value">${ehpPhys}</div>
</div>

<div class="stat">
<div class="stat-name">EHP Magical</div>
<div class="stat-value">${ehpMagic}</div>
</div>

`;

}

document.getElementById("lvl").addEventListener("input",(e)=>{

STATE.lvl=parseInt(e.target.value);

document.getElementById("lvlText").textContent=
`Level ${STATE.lvl}`;

calc();

});

renderSlots();
renderRunes();
calc();

</script>

</body>
</html>
