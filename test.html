<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Urgot Calculator — Season 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#071009;--bg2:#0F1D12;--card:#132417;--border:#24422B;--green:#4ADE80;--green2:#22C55E;--text:#D6F5D3;--text2:#6B8F71;--gold:#D7B56D;--red:#C84B4B;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;padding:24px;}
h1{font-family:'Cinzel',serif;font-size:36px;margin-bottom:24px;}
.card{background:var(--bg2);border:1px solid var(--border);padding:20px;border-radius:10px;margin-bottom:20px;}
.title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green2);margin-bottom:18px;}
.slider-wrap{display:flex;gap:16px;align-items:center;}
#levelText{font-size:30px;font-weight:700;min-width:130px;}
input[type=range]{width:100%;}
/* STATS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.stat{background:var(--card);border:1px solid #1F3624;padding:14px;border-radius:8px;}
.stat-name{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;}
.stat-bonus{font-size:13px;color:var(--green2);margin-top:2px;}
/* SLOTS */
.slots{display:grid;grid-template-columns:repeat(6,70px);gap:10px;margin-bottom:10px;}
.slot{width:70px;height:70px;background:#111;border:2px dashed var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.slot img{width:100%;height:100%;object-fit:cover;}
.slot-n{font-size:13px;color:var(--text2);}
.remove{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:3px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;cursor:pointer;z-index:3;}
/* ITEM MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100;}
.modal.open{display:flex;}
.modal-box{width:min(1300px,96vw);height:90vh;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
.modal-top{padding:14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.msearch{flex:1;min-width:180px;padding:10px;background:#111;border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;}
.mclose{padding:10px 16px;background:#111;border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:6px;font-family:'Rajdhani',sans-serif;}
.mcats{display:flex;gap:6px;flex-wrap:wrap;}
.mcat{padding:5px 12px;background:#111;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:4px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;transition:.15s;}
.mcat.on{border-color:var(--green);color:var(--green);}
.items-grid{padding:16px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;flex:1;}
.item{background:var(--card);border:1px solid #203626;padding:8px;border-radius:6px;cursor:pointer;text-align:center;transition:.2s;}
.item:hover{border-color:var(--green);transform:translateY(-2px);}
.item img{width:52px;height:52px;margin-bottom:5px;}
.item span{font-size:10px;display:block;line-height:1.3;}
/* RUNE LAYOUT */
.runes-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:750px){.runes-layout{grid-template-columns:1fr;}}
.rune-col{background:var(--card);border:1px solid #203626;border-radius:10px;padding:16px;}
.rune-col-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.rune-col-title img{width:24px;height:24px;border-radius:4px;}
/* Tree selector tabs */
.tree-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tree-tab{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#0a1510;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:6px;font-size:11px;font-family:'Cinzel',serif;letter-spacing:.07em;transition:.15s;white-space:nowrap;}
.tree-tab img{width:18px;height:18px;border-radius:3px;flex-shrink:0;}
.tree-tab:hover{border-color:var(--green2);color:var(--text);}
.tree-tab.on-pri{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08);}
.tree-tab.on-sec{border-color:#0BC4E3;color:#0BC4E3;background:rgba(11,196,227,.07);}
/* Row labels */
.row-lbl{font-size:9px;font-family:'Cinzel',serif;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);margin:.65rem 0 .3rem;}
/* Rune grids */
.keystone-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:2px;}
.rune-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:2px;}
.rune-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:2px;}
/* Individual rune button */
.rune-btn{position:relative;overflow:hidden;border:1px solid #27422D;padding:7px 5px 7px;border-radius:7px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif;text-align:center;transition:.15s;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;background:#0d1a10;letter-spacing:.04em;line-height:1.2;}
.rune-btn img{width:34px;height:34px;border-radius:4px;flex-shrink:0;}
.keystone-grid .rune-btn{min-height:78px;}
.keystone-grid .rune-btn img{width:42px;height:42px;}
.rune-btn:hover{border-color:var(--green2);transform:translateY(-1px);}
.rune-btn.on-pri{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.3),inset 0 0 10px rgba(74,222,128,.12);}
.rune-btn.on-sec{border-color:#0BC4E3;box-shadow:0 0 10px rgba(11,196,227,.25);}
/* SHARDS */
.shards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
.shard-col{display:flex;flex-direction:column;gap:4px;}
.shard-btn{display:flex;align-items:center;gap:5px;padding:5px 7px;background:#0a1510;border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:5px;font-size:11px;transition:.15s;white-space:nowrap;}
.shard-btn img{width:18px;height:18px;border-radius:3px;flex-shrink:0;}
.shard-btn:hover{border-color:var(--green2);}
.shard-btn.on{border-color:var(--green);color:var(--green);}
/* SPELL CARDS */
.passive{margin-top:20px;padding:16px;background:var(--card);border:1px solid #203626;border-radius:8px;}
.passive-title{font-family:'Cinzel',serif;font-size:14px;margin-bottom:14px;color:var(--green);}
.spell-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.spell-card{background:#101913;border:1px solid #27422D;padding:12px;border-radius:8px;}
.spell-name{font-family:'Cinzel',serif;font-size:11px;margin-bottom:6px;color:var(--gold);}
.spell-cd{font-size:24px;font-weight:700;color:var(--green);margin-bottom:4px;}
.spell-info{font-size:11px;color:var(--text2);}
.leg-box{margin-top:14px;padding:14px;background:#101913;border:1px solid #27422D;border-radius:8px;}
.leg-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--green);margin-bottom:10px;text-transform:uppercase;}
.leg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:6px;}
.leg-stat{font-size:12px;color:var(--text);}
.leg-stat strong{color:var(--green2);}
</style>
</head>

// ITEMS whitelist ranked SR
// All SR purchasable items loaded dynamically
function getItemCat(tags,gold){
  if(!tags||!tags.length) return 'Component';
  if(tags.includes('Boots')) return 'Boots';
  if(tags.includes('Jungle')) return 'Jungle';
  if(tags.includes('Trinket')) return 'Trinket';
  if(tags.includes('GoldPer')) return 'Support';
  const total=gold&&gold.total||0;
  if(total>0&&total<1300&&!tags.includes('Damage')&&!tags.includes('Armor')&&!tags.includes('SpellBlock')) return 'Starter';
  if(tags.includes('CriticalStrike')) return 'Marksman';
  if(tags.includes('SpellDamage')&&!tags.includes('Damage')) return 'Mage';
  if(tags.includes('SpellDamage')&&tags.includes('AbilityHaste')) return 'Mage';
  if(tags.includes('Lethality')&&!tags.includes('Health')) return 'Assassin';
  if(tags.includes('Damage')&&tags.includes('Health')) return 'Fighter';
  if(tags.includes('Damage')) return 'Fighter';
  if(tags.includes('Armor')||tags.includes('SpellBlock')) return 'Tank';
  if(tags.includes('Health')&&total>2000) return 'Tank';
  if(total<1500) return 'Component';
  return 'Component';
}
const LETH_MAP={3814:20,6695:18,6692:20,3142:18,6701:20};
const APEN_MAP={3033:30,3036:35};
const OMNI_MAP={223008:8,1055:3};
const SPECIAL={2501:'bloodmail',6665:'jaksho',3071:'bc'};

let ALL_ITEMS=[];
let activeCat='All';

async function loadItems(){
  try{
    const r=await fetch(`https://ddragon.leagueoflegends.com/cdn/16.9.1/data/en_US/item.json`);
    const d=await r.json();
    ALL_ITEMS=Object.entries(d.data)
      .filter(([id,it])=>{
        const maps=it.maps||{};
        if(!maps['11']) return false; // SR only
        const gold=it.gold||{};
        if(!gold.purchasable) return false;
        const tags=it.tags||[];
        if(tags.includes('Trinket')) return false;
        return true;
      })
      .map(([id,it])=>({
        id:+id, name:it.name,
        cat:getItemCat(it.tags,it.gold),
        img:`https://ddragon.leagueoflegends.com/cdn/16.9.1/img/item/${id}.png`,
        hp:it.stats.FlatHPPoolMod||0,
        ad:it.stats.FlatPhysicalDamageMod||0,
        armor:it.stats.FlatArmorMod||0,
        mr:it.stats.FlatSpellBlockMod||0,
        ah:it.stats.FlatHasteMod||0,
        as:it.stats.PercentAttackSpeedMod||0,
        crit:(it.stats.FlatCritChanceMod||0)*100,
        ls:(it.stats.PercentLifeStealMod||0)*100,
        ms:it.stats.FlatMovementSpeedMod||0,
        ms_pct:it.stats.PercentMovementSpeedMod||0,
        leth:LETH_MAP[+id]||0,
        apen:APEN_MAP[+id]||0,
        omni:OMNI_MAP[+id]||0,
        special:SPECIAL[+id]||null,
      }));
    renderItems();
  }catch(e){console.error('Items load error',e);}
}

// ═══ STATE ═══
const S={
  lvl:9,
  items:[null,null,null,null,null,null],
  priTree:'precision',
  secTree:'resolve',
  keystone:'pta',
  pri:[null,null,null],   // 3 primary rows
  sec:[null,null],        // 2 secondary picks
  sh:['s1_ad','s2_hp','s3_65'],
  slot:null,
};

// ═══ SLOTS ═══
function renderSlots(){
  const g=document.getElementById('slots'); g.innerHTML='';
  S.items.forEach((it,i)=>{
    const d=document.createElement('div'); d.className='slot';
    if(it){
      d.innerHTML=`<img src="${it.img}" title="${it.name}"><div class="remove">✕</div>`;
      d.querySelector('.remove').onclick=e=>{e.stopPropagation();S.items[i]=null;renderSlots();calc();};
    } else d.innerHTML=`<span class="slot-n">${i+1}</span>`;
    d.onclick=()=>openModal(i);
    g.appendChild(d);
  });
}

function openModal(i){S.slot=i;document.getElementById('modal').classList.add('open');document.getElementById('msearch').value='';renderMCats();renderItems();setTimeout(()=>document.getElementById('msearch').focus(),40);}
function closeModal(){document.getElementById('modal').classList.remove('open');S.slot=null;}
document.getElementById('mclose').onclick=closeModal;
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};

const CAT_LIST=['All','Fighter','Tank','Boots','Marksman','Mage','Assassin','Support','Jungle','Starter','Component'];
function renderMCats(){
  const c=document.getElementById('mcats'); c.innerHTML='';
  CAT_LIST.forEach(cat=>{
    const b=document.createElement('button'); b.className='mcat'+(activeCat===cat?' on':'');
    b.textContent=cat; b.onclick=()=>{activeCat=cat;renderMCats();renderItems();};
    c.appendChild(b);
  });
}
function renderItems(){
  const g=document.getElementById('mgrid'); g.innerHTML='';
  const q=document.getElementById('msearch').value.toLowerCase();
  const list=ALL_ITEMS.filter(it=>(activeCat==='All'||it.cat===activeCat)&&(!q||it.name.toLowerCase().includes(q)));
  if(!list.length){g.innerHTML='<div style="color:var(--text2);padding:1rem;grid-column:1/-1">No items</div>';return;}
  list.forEach(it=>{
    const d=document.createElement('div'); d.className='item';
    d.innerHTML=`<img src="${it.img}"><span>${it.name}</span>`;
    d.onclick=()=>{if(S.slot!==null){S.items[S.slot]=it;closeModal();renderSlots();calc();}};
    g.appendChild(d);
  });
}
document.getElementById('msearch').addEventListener('input',renderItems);

// ═══ RUNE HELPERS ═══
function findRune(id){
  if(!id) return null;
  for(const tk of TREE_KEYS){
    const t=TREES[tk];
    for(const k of t.keystones) if(k.id===id) return k;
    for(const row of t.rows) for(const r of row) if(r.id===id) return r;
  }
  for(const slot of SHARDS) for(const r of slot) if(r.id===id) return r;
  return null;
}

function mkRuneBtn(rune, onClick, isOn, isSec){
  const b=document.createElement('button');
  b.className='rune-btn'+(isOn?(isSec?' on-sec':' on-pri'):'');
  b.title=rune.n;
  b.innerHTML=`<img src="${rune.img}" onerror="this.style.opacity='.3'"/><span>${rune.n}</span>`;
  b.onclick=onClick;
  return b;
}

// ═══ RENDER RUNES ═══
function renderRunes(){
  const pt=TREES[S.priTree];
  const st=TREES[S.secTree];

  // PRIMARY title
  document.getElementById('pri-title').innerHTML=`<img src="${pt.img}" onerror="this.style.display='none'"/> PRIMARY — ${pt.label}`;
  // SECONDARY title
  document.getElementById('sec-title').innerHTML=`<img src="${st.img}" onerror="this.style.display='none'"/> SECONDARY — ${st.label}`;

  // ── PRIMARY TABS ──
  const priTabs=document.getElementById('pri-tabs'); priTabs.innerHTML='';
  TREE_KEYS.forEach(tk=>{
    const t=TREES[tk];
    const b=document.createElement('button');
    b.className='tree-tab'+(S.priTree===tk?' on-pri':'');
    b.innerHTML=`<img src="${t.img}" onerror="this.style.display='none'"/>${t.label}`;
    b.onclick=()=>{
      S.priTree=tk; S.keystone=null; S.pri=[null,null,null];
      if(S.secTree===tk) S.secTree=TREE_KEYS.find(k=>k!==tk);
      S.sec=[null,null];
      renderRunes(); calc();
    };
    priTabs.appendChild(b);
  });

  // ── SECONDARY TABS (exclude primary tree) ──
  const secTabs=document.getElementById('sec-tabs'); secTabs.innerHTML='';
  TREE_KEYS.filter(tk=>tk!==S.priTree).forEach(tk=>{
    const t=TREES[tk];
    const b=document.createElement('button');
    b.className='tree-tab'+(S.secTree===tk?' on-sec':'');
    b.innerHTML=`<img src="${t.img}" onerror="this.style.display='none'"/>${t.label}`;
    b.onclick=()=>{S.secTree=tk;S.sec=[null,null];renderRunes();calc();};
    secTabs.appendChild(b);
  });

  // ── PRIMARY RUNES ──
  const pc=document.getElementById('pri-content'); pc.innerHTML='';

  // Keystones
  const lbl0=document.createElement('div'); lbl0.className='row-lbl'; lbl0.textContent='Keystone';
  pc.appendChild(lbl0);
  const kg=document.createElement('div'); kg.className='keystone-grid';
  pt.keystones.forEach(k=>{
    kg.appendChild(mkRuneBtn(k,()=>{S.keystone=(S.keystone===k.id?null:k.id);renderRunes();calc();},S.keystone===k.id,false));
  });
  pc.appendChild(kg);

  // Primary rows
  pt.rows.forEach((row,i)=>{
    const lbl=document.createElement('div'); lbl.className='row-lbl'; lbl.textContent=`Ligne ${i+1}`;
    pc.appendChild(lbl);
    const cls=row.length<=3?'rune-row-3':'rune-row-4';
    const rg=document.createElement('div'); rg.className=cls;
    row.forEach(r=>{
      rg.appendChild(mkRuneBtn(r,()=>{S.pri[i]=(S.pri[i]===r.id?null:r.id);renderRunes();calc();},S.pri[i]===r.id,false));
    });
    pc.appendChild(rg);
  });

  // ── SECONDARY RUNES ──
  const sc=document.getElementById('sec-content'); sc.innerHTML='';
  const allSec=st.rows.flat();

  [0,1].forEach(i=>{
    const lbl=document.createElement('div'); lbl.className='row-lbl'; lbl.textContent=`Choix ${i+1}`;
    sc.appendChild(lbl);
    const cls=allSec.length<=9?'rune-row-3':'rune-row-4';
    // Group by original rows for layout
    st.rows.forEach(row=>{
      const rg=document.createElement('div'); rg.className='rune-row-3';
      row.forEach(r=>{
        const isOn=S.sec[i]===r.id;
        const taken=S.sec[1-i]===r.id; // already in other slot
        const b=mkRuneBtn(r,()=>{
          if(!taken){S.sec[i]=(S.sec[i]===r.id?null:r.id);renderRunes();calc();}
        },isOn,true);
        if(taken){b.style.opacity='.3';b.style.pointerEvents='none';}
        rg.appendChild(b);
      });
      sc.appendChild(rg);
    });
  });

  // ── SHARDS ──
  renderShards();
}

function renderShards(){
  const g=document.getElementById('shards'); g.innerHTML='';
  SHARDS.forEach((opts,i)=>{
    const col=document.createElement('div'); col.className='shard-col';
    const lbl=document.createElement('div'); lbl.className='row-lbl'; lbl.textContent=`Slot ${i+1}`;
    col.appendChild(lbl);
    opts.forEach(sh=>{
      const b=document.createElement('button');
      b.className='shard-btn'+(S.sh[i]===sh.id?' on':'');
      b.innerHTML=`<img src="${sh.img}" onerror="this.style.display='none'"/>${sh.n}`;
      b.onclick=()=>{S.sh[i]=sh.id;renderShards();calc();};
      col.appendChild(b);
    });
    g.appendChild(col);
  });
}

// ═══ CALC ═══
function getAH(){
  let ah=0;
  S.items.forEach(it=>{if(it)ah+=it.ah||0;});
  [S.keystone,...S.pri,...S.sec,...S.sh].forEach(id=>{const r=findRune(id);if(r&&r.s&&r.s.ah)ah+=r.s.ah;});
  return ah;
}
function cdF(base,ah){return base*(100/(100+ah));}

function calc(){
  const l=S.lvl;
  // Base
  let hp=grow(BASE.hp.b,BASE.hp.g,l), bHP=hp;
  let ad=grow(BASE.ad.b,BASE.ad.g,l), bAD=ad;
  let armor=grow(BASE.armor.b,BASE.armor.g,l), bArmor=armor;
  let mr=grow(BASE.mr.b,BASE.mr.g,l), bMR=mr;
  let as_=growAS(BASE.asBase,BASE.asGrowth,l);
  let hp5=grow(BASE.hpReg.b,BASE.hpReg.g,l)*5;
  let ms=BASE.ms,crit=0,ls=0,ah=0,leth=0,apen=0,mrpen=0,omni=0,ten=0,ms_pct=0;

  // Rune stats
  [S.keystone,...S.pri,...S.sec,...S.sh].forEach(id=>{
    const r=findRune(id); if(!r||!r.s) return;
    const s=r.s;
    if(s.hp==='scale') hp+=shardHP(l); else if(s.hp) hp+=s.hp;
    if(s.ad)      ad+=s.ad;
    if(s.armor)   armor+=s.armor;
    if(s.mr)      mr+=s.mr;
    if(s.as)      as_=Math.min(as_*(1+s.as),2.5);
    if(s.ls)      ls+=s.ls;
    if(s.ah)      ah+=s.ah;
    if(s.leth)    leth+=s.leth;
    if(s.ms_flat) ms+=s.ms_flat;
    if(s.ms_pct)  ms_pct+=s.ms_pct;
    if(s.ten)     ten+=s.ten;
  });

  // Item stats
  let hasBC=false,hasBlood=false,hasJak=false;
  S.items.forEach(it=>{
    if(!it) return;
    hp+=it.hp||0; ad+=it.ad||0; armor+=it.armor||0; mr+=it.mr||0;
    ah+=it.ah||0; crit+=it.crit||0; ls+=it.ls||0; leth+=it.leth||0;
    apen+=it.apen||0; mrpen+=it.mrpen||0; omni+=it.omni||0;
    ms+=it.ms||0; if(it.ms_pct) ms_pct+=it.ms_pct;
    if(it.as) as_=Math.min(as_*(1+it.as),2.5);
    if(it.special==='bloodmail') hasBlood=true;
    if(it.special==='jaksho')   hasJak=true;
    if(it.special==='bc')       hasBC=true;
  });

  const bonusHP=hp-bHP;
  // Bloodmail +4% AD per 100 bonus HP
  let bloodAD=0;
  if(hasBlood){bloodAD=Math.floor(bonusHP/100)*0.04*(ad-bAD);ad+=bloodAD;}
  // Jak'Sho +12% resists at 6 stacks
  let jakA=0,jakM=0;
  if(hasJak){jakA=armor*0.12;jakM=mr*0.12;armor+=jakA;mr+=jakM;}
  // MS%
  if(ms_pct) ms=Math.floor(ms*(1+ms_pct));

  const ehpP=hp*(1+armor/100), ehpM=hp*(1+mr/100);

  // Passif legs
  const ADR=[.40,.40,.40,.40,.60,.60,.60,.60,.80,.80,.80,.80,1,1,1,1,1,1.05,1.05,1.10];
  const HPR=[.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.02,.04,.04,.04,.05,.06,.06,.06,.06];
  const LCD=[30,28,26,22,18,15,12,10,8,6,4.5,3.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5];
  const adR=ADR[l-1]||1.10, hpR=HPR[l-1]||.06, legCD=LCD[l-1]||2.5;
  const legAD=ad*adR, legHP=hp*hpR;

  // Spell CDs
  const ah_=ah;
  const rRk=l>=16?3:l>=11?2:1;
  const wRk=Math.min(5,l>=9?5:Math.max(1,l-1));
  const eRk=1;
  const qRk=Math.max(1,Math.min(5,l-wRk-eRk-(rRk-1)));
  const qCD=cdF(SPELLS.Q.cd[Math.max(0,qRk-1)],ah_);
  const wCD=wRk===5?0:cdF(SPELLS.W.cd[Math.max(0,wRk-1)],ah_);
  const eCD=cdF(SPELLS.E.cd[eRk-1],ah_);
  const rCD=cdF(SPELLS.R.cd[rRk-1],ah_);

  // ── Render Stats ──
  const g=document.getElementById('stats');
  const s=(ico,nm,v,bon)=>`<div class="stat"><div class="stat-name">${ico} ${nm}</div><div class="stat-value">${v}</div>${bon!==undefined&&bon>0?`<div class="stat-bonus">+${Math.round(bon)}</div>`:''}</div>`;
  g.innerHTML=
    s('❤️','Health',Math.round(hp),hp-bHP)+
    s('⚔️','Attack Damage',Math.round(ad),ad-bAD)+
    s('🛡','Armor',Math.round(armor),armor-bArmor)+
    s('🔮','Magic Resist',Math.round(mr),mr-bMR)+
    s('⚡','Attack Speed',as_.toFixed(3))+
    s('💨','Move Speed',Math.round(ms))+
    s('🩹','HP Regen /5s',hp5.toFixed(1))+
    s('🎯','Crit Chance',crit+'%')+
    s('🩸','Life Steal',ls+'%')+
    s('⏱','Ability Haste',Math.round(ah_))+
    s('🔪','Lethality',Math.round(leth))+
    s('📐','Armor Pen%',apen+'%')+
    s('🌀','Magic Pen%',mrpen+'%')+
    s('💊','Omnivamp',omni+'%')+
    (ten?s('🧊','Tenacity',ten+'%'):'')+
    s('🏋','EHP Phys',Math.round(ehpP))+
    s('🔥','EHP Magic',Math.round(ehpM));

  // Spells + passive
  let notes='';
  if(hasBlood&&bloodAD>0.5) notes+=`<div class="leg-stat">Bloodmail bonus: <strong>+${Math.round(bloodAD)} AD</strong></div>`;
  if(hasJak) notes+=`<div class="leg-stat">Jak'Sho 6 stacks: <strong>+${Math.round(jakA)} armor / +${Math.round(jakM)} MR</strong></div>`;
  if(hasBC)  notes+=`<div class="leg-stat">Black Cleaver: <strong>36% armor shred max</strong></div>`;

  document.getElementById('spells').innerHTML=`
<div class="passive-title">Ability Cooldowns — AH: ${Math.round(ah_)}</div>
<div class="spell-grid">
  <div class="spell-card"><div class="spell-name">Q — ${SPELLS.Q.n}</div><div class="spell-cd">${qCD.toFixed(2)}s</div><div class="spell-info">Base ${SPELLS.Q.cd[qRk-1]}s · Rang ${qRk}/5</div></div>
  <div class="spell-card"><div class="spell-name">W — ${SPELLS.W.n}</div><div class="spell-cd">${wCD===0?'Toggle':wCD.toFixed(2)+'s'}</div><div class="spell-info">Rang ${wRk}/5${wRk===5?' — Toggle infini':''}</div></div>
  <div class="spell-card"><div class="spell-name">E — ${SPELLS.E.n}</div><div class="spell-cd">${eCD.toFixed(2)}s</div><div class="spell-info">Base ${SPELLS.E.cd[eRk-1]}s · Rang ${eRk}/5</div></div>
  <div class="spell-card"><div class="spell-name">R — ${SPELLS.R.n}</div><div class="spell-cd">${rCD.toFixed(2)}s</div><div class="spell-info">Base ${SPELLS.R.cd[rRk-1]}s · Rang ${rRk}/3</div></div>
</div>
<div class="leg-box">
<div class="leg-title">⚙ Echoing Flames — Niveau ${l}</div>
<div class="leg-grid">
  <div class="leg-stat">AD/leg: <strong>${Math.round(adR*100)}% → ${Math.round(legAD)} dmg</strong></div>
  <div class="leg-stat">HP%/leg: <strong>${Math.round(hpR*100)}% → ${Math.round(legHP)} dmg</strong></div>
  <div class="leg-stat">6-leg burst: <strong>${Math.round(legAD*6)} AD + ${Math.round(legHP*6)} HP</strong></div>
  <div class="leg-stat">CD/leg: <strong>${legCD}s</strong></div>
  ${notes}
</div></div>`;
}

// ═══ INIT ═══
document.getElementById('levelSlider').addEventListener('input',e=>{
  S.lvl=+e.target.value;
  document.getElementById('levelText').textContent=`Level ${S.lvl}`;
  calc();
});

renderSlots();
renderRunes();
calc();
loadItems();
</script>
