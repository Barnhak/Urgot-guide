function slugify(name) {
  return name.toLowerCase()
    .replace(/ & /g,"-").replace(/[^\w\s-]/g,"")
    .replace(/\s+/g,"-").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function renderGrid(filter) {
  var grid = document.getElementById("champ-grid");
  var count = document.getElementById("filter-count");
  var filtered = filter
    ? champions.filter(function(c){ return c.name.toLowerCase().includes(filter.toLowerCase()); })
    : champions;
  count.textContent = filtered.length + " champion" + (filtered.length > 1 ? "s" : "");
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML = "<div class=\"no-results\">No champion found</div>";
    return;
  }
  filtered.forEach(function(champ, i) {
    var url = "matchup/" + slugify(champ.name) + ".html";
    var a = document.createElement("a");
    a.className = "champ-card";
    a.href = url;
    a.style.animationDelay = (i * 0.02) + "s";
    var img = document.createElement("img");
    img.src = champ.img;
    img.alt = champ.name;
    img.loading = "lazy";
    img.style.objectPosition = champ.pos;
    img.onerror = function() { this.src = "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/" + champ.name.replace(/[^a-zA-Z]/g,"") + "_0.jpg"; };
    var wrap = document.createElement("div");
    wrap.className = "champ-img-wrap";
    wrap.appendChild(img);
    var label = document.createElement("div");
    label.className = "champ-name";
    label.textContent = champ.name;
    a.appendChild(wrap);
    a.appendChild(label);
    grid.appendChild(a);
  });
}

function filterChamps() { renderGrid(document.getElementById("filter-input").value); }

function navFilter() {
  var val = document.getElementById("nav-search-input").value;
  var navList = document.getElementById("nav-list");
  var navDropdown = document.getElementById("nav-dropdown");
  navList.innerHTML = "";
  if (val.length < 1) { navDropdown.style.display = "none"; return; }
  var filtered = champions.filter(function(c){ return c.name.toLowerCase().includes(val.toLowerCase()); });
  navDropdown.style.display = filtered.length ? "block" : "none";
  filtered.forEach(function(champ) {
    var url = "matchup/" + slugify(champ.name) + ".html";
    var a = document.createElement("a");
    a.className = "nav-dropdown-item"; a.href = url; var img = document.createElement("img");
    img.src = champ.img;
    img.alt = champ.name;
    img.style.objectPosition = champ.pos;
    img.onerror = function(){ this.style.display="none"; };
    a.appendChild(img);
    var span = document.createElement("span");
    span.textContent = champ.name;
    a.appendChild(span);
    navList.appendChild(a);
  });
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".nav-search")) document.getElementById("nav-dropdown").style.display = "none";
});
