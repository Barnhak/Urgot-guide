    html { scroll-behavior: smooth; }

    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem; background: rgba(6,13,7,0.95);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);

    .nav-logo { font-family: "Cinzel", serif; font-size: 14px; letter-spacing: 0.2em; color: var(--green); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); }
    .nav-search { position: relative; }
    .nav-search input { background: rgba(15,34,17,0.8); border: 1px solid var(--border-bright); border-radius: 3px; color: var(--text-bright); font-family: "Rajdhani", sans-serif; font-size: 12px; padding: 5px 30px 5px 10px; width: 180px; outline: none; transition: border-color 0.2s, width 0.3s; }
    .nav-search input:focus { border-color: var(--green-mid); width: 220px; }
    .nav-search input::placeholder { color: var(--text-dim); }
    .nav-search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--green-mid); pointer-events: none; }
    .nav-dropdown { position: absolute; top: calc(100% + 6px); right: 0; width: 220px; background: var(--bg-card); border: 1px solid var(--border-bright); border-radius: 4px; max-height: 280px; overflow-y: auto; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.7); z-index: 200; }
    .nav-dropdown::-webkit-scrollbar { width: 3px; }
    .nav-dropdown::-webkit-scrollbar-thumb { background: var(--border-bright); }
    .nav-dropdown h4 { padding: 7px 12px; font-family: "Cinzel", serif; font-size: 8px; letter-spacing: 0.25em; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .nav-dropdown-item { position:relative;display:block;padding:0;height:52px;overflow:hidden;border-bottom:1px solid rgba(26,61,30,0.3);text-decoration:none; }
    .nav-dropdown-item:last-child { border-bottom: none; }
    .nav-dropdown-item img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:brightness(0.55) saturate(0.7);transition:filter 0.2s; }
    .nav-dropdown-item:hover img { filter:brightness(0.75) saturate(1); }
    .nav-dropdown-item span { position:relative;z-index:1;display:flex;align-items:center;height:52px;padding:0 12px;font-size:13px;font-weight:600;color:var(--text-bright);text-shadow:0 1px 6px rgba(0,0,0,0.9);transition:color 0.2s; }
    .nav-dropdown-item:hover span { color: var(--green); }

    .hero { position: relative; height: 50vh; min-height: 320px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: url("https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Urgot_2.jpg") center 30% / cover no-repeat; filter: brightness(0.3) saturate(0.6); animation: heroZoom 20s ease-in-out infinite alternate; }
    @keyframes heroZoom { from{transform:scale(1.03)} to{transform:scale(1.08)} }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,13,7,0.4) 0%, rgba(6,13,7,0) 40%, rgba(6,13,7,0.8) 85%, var(--bg) 100%); }
    .hero-content { position: relative; text-align: center; animation: fadeDown 0.8s ease both; }
    .hero-eyebrow { font-family: "Cinzel", serif; font-size: 10px; letter-spacing: 0.4em; color: var(--green-mid); text-transform: uppercase; margin-bottom: 0.75rem; opacity: 0.8; }
    .hero-title { font-family: "Cinzel", serif; font-size: clamp(32px, 6vw, 60px); font-weight: 900; color: var(--text-bright); letter-spacing: 0.06em; text-shadow: 0 0 60px rgba(74,222,128,0.15), 0 4px 20px rgba(0,0,0,0.8); }
    .hero-title span { color: var(--green); }

    .main { max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; flex-wrap: wrap; }
    .filter-input-wrap { position: relative; flex: 1; max-width: 340px; }
    .filter-input-wrap input { width: 100%; padding: 10px 40px 10px 14px; background: var(--bg-surface); border: 1px solid var(--border-bright); border-radius: 4px; color: var(--text-bright); font-family: "Rajdhani", sans-serif; font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.2s; }

    .filter-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--green-mid); pointer-events: none; }
    .filter-count { font-family: "Cinzel", serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); }
    .tierlist-btn { font-family: "Cinzel", serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); text-decoration: none; border: 1px solid var(--green-dark); border-radius: 3px; padding: 8px 18px; transition: all 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
    .tierlist-btn:hover { background: rgba(74,222,128,0.08); border-color: var(--green-mid); color: var(--text-bright); }

    /* GRID */
    .champ-grid { display: grid; grid-template-columns: 1fr; gap: 3px; }
    .champ-card { display: block; text-decoration: none; position: relative; overflow: hidden; background: var(--bg-card); height: 200px; transition: transform 0.25s; animation: fadeUp 0.4s ease both; cursor: pointer; }
    .champ-card:hover { transform: scale(1.06); z-index: 10; }
    .champ-img-wrap { position: absolute; inset: 0; }
    .champ-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; display: block; filter: brightness(0.75) saturate(0.75); transition: filter 0.3s, transform 0.3s; }
    .champ-card:hover .champ-img-wrap img { filter: brightness(1) saturate(1); transform: scale(1.04); }
    .champ-img-wrap::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to right, rgba(6,13,7,0.9) 0%, rgba(6,13,7,0.55) 30%, transparent 60%); }
    .champ-card::after { content: ""; position: absolute; inset: 0; border: 1px solid transparent; transition: border-color 0.25s; pointer-events: none; z-index: 3; }
    .champ-card:hover::after { border-color: var(--green-mid); }

    /* CARD CONTENT */
    .card-content { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem 0 1.75rem; z-index: 2; }
    .champ-name { font-family: "Cinzel", serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-bright); text-shadow: 0 2px 12px rgba(0,0,0,0.95); transition: color 0.2s; }
    .champ-card:hover .champ-name { color: var(--green); }

    /* DIFFICULTY BADGE */
    .diff-badge {
      font-family: "Cinzel", serif; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; font-weight: 700;
      padding: 5px 12px; border-radius: 3px;
      border: 1px solid var(--badge-color, #4A7550);
      color: var(--badge-color, #4A7550);
      background: var(--badge-bg, rgba(74,117,80,0.1));
      white-space: nowrap; flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
    }
    .diff-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--badge-color, #4A7550); flex-shrink: 0; }
    .diff-score { font-size: 9px; opacity: 0.7; font-weight: 400; }

    .no-results { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-dim); font-family: "Cinzel", serif; font-size: 13px; letter-spacing: 0.15em; }
    footer { border-top: 1px solid var(--border); padding: 2rem 1rem; text-align: center; font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); }
    footer a { color: var(--green-dark); text-decoration: none; }
    footer a:hover { color: var(--green-mid); }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:none} }

].sort(function(a,b){ return a.name.localeCompare(b.name); });

function slugify(name) {
  return name.toLowerCase().replace(/ & /g,"-").replace(/[^\w\s-]/g,"").replace(/\s+/g,"-").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function renderGrid(filter) {
  var grid  = document.getElementById("champ-grid");
  var count = document.getElementById("filter-count");
  var filtered = filter
    ? champions.filter(function(c){ return c.name.toLowerCase().includes(filter.toLowerCase()); })
    : champions;
  count.textContent = filtered.length + " champion" + (filtered.length > 1 ? "s" : "");
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No champion found</div>';
    return;
  }
  filtered.forEach(function(champ, i) {
    var score  = SCORES[champ.name] || 0;
    var badge  = getBadge(score);
    var url    = "matchup/" + slugify(champ.name) + ".html";

    var a = document.createElement("a");
    a.className = "champ-card";
    a.href = url;
    a.style.animationDelay = (i * 0.015) + "s";

    // Background image
    var img = document.createElement("img");
    img.src = champ.img; img.alt = champ.name; img.loading = "lazy";
    img.style.objectPosition = champ.pos;
    img.onerror = function(){ this.src = "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/" + champ.name.replace(/[^a-zA-Z]/g,"") + "_0.jpg"; };
    var wrap = document.createElement("div");
    wrap.className = "champ-img-wrap";
    wrap.appendChild(img);

    // Card content row
    var content = document.createElement("div");
    content.className = "card-content";

    var nameEl = document.createElement("div");
    nameEl.className = "champ-name";
    nameEl.textContent = champ.name;

    // Difficulty badge
    var badgeEl = document.createElement("div");
    badgeEl.className = "diff-badge";
    badgeEl.style.setProperty("--badge-color", badge.color);
    badgeEl.style.setProperty("--badge-bg", badge.bg);
    badgeEl.innerHTML = badge.label + (score ? ' <span class="diff-score">' + score + '/10</span>' : '');

    content.appendChild(nameEl);
    content.appendChild(badgeEl);

    a.appendChild(wrap);
    a.appendChild(content);
    grid.appendChild(a);
  });
}

function filterChamps(){ renderGrid(document.getElementById("filter-input").value); }

function navFilter() {
  var val = document.getElementById("nav-search-input").value;
  var navList = document.getElementById("nav-list");
  var navDropdown = document.getElementById("nav-dropdown");
  navList.innerHTML = "";
  if (val.length < 1) { navDropdown.style.display = "none"; return; }
  var filtered = champions.filter(function(c){ return c.name.toLowerCase().includes(val.toLowerCase()); });
  navDropdown.style.display = filtered.length ? "block" : "none";
  filtered.forEach(function(champ) {
    var url = "matchup/" + slugify(champ.name) + ".html";
    var a = document.createElement("a"); a.className = "nav-dropdown-item"; a.href = url;
    var img = document.createElement("img"); img.src = champ.img; img.alt = champ.name;
    img.style.objectPosition = champ.pos;
    img.onerror = function(){ this.style.display="none"; };
    a.appendChild(img);
    var span = document.createElement("span"); span.textContent = champ.name;
    a.appendChild(span);
    navList.appendChild(a);
  });
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".nav-search")) document.getElementById("nav-dropdown").style.display = "none";
});

renderGrid("");
document.getElementById("filter-count").textContent = champions.length + " champions";
</script>
</body>
</html>
